<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEEPLY - Správa prevádzok</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --deeply-yellow: #FFD700; --deeply-dark: #1a1a1a; --check-color: #27ae60; --bg: #f4f4f4; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--deeply-dark); }
        
        header { position: sticky; top: 0; background: var(--deeply-yellow); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: 900; font-size: 1.3em; }
        .nav-btn { background: rgba(0,0,0,0.05); border: none; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .nav-btn.active { background: var(--deeply-dark); color: white; }
        
        #main-content { padding: 15px; padding-bottom: 100px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .karta { padding: 20px; border-radius: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; position: relative; border: 3px solid transparent; background: white; transition: 0.1s; }
        .karta:active { transform: scale(0.96); }
        
        .status-ok { border-color: var(--check-color); }
        .status-warning { border-color: var(--warning); }
        .status-danger { border-color: var(--danger); }
        .status-sklad { border-color: #ddd; background: #f9f9f9; }

        .pradlo-badge { position: absolute; top: 10px; right: 10px; font-size: 1.2em; }
        
        .tab-wrapper { display: flex; background: #e0e0e0; border-radius: 15px; padding: 4px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: bold; background: none; color: #666; font-size: 0.8em; }
        .tab-btn.active { background: white; color: var(--deeply-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .item-row { background: white; margin-bottom: 10px; padding: 18px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-main { width: 100%; padding: 18px; background: var(--deeply-dark); color: white; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 1em; margin-top: 10px; }
        
        input, select { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 15px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .admin-section { background: white; padding: 20px; border-radius: 25px; margin-bottom: 20px; }
        .hidden { display: none !important; }

        #view-login { height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; background: var(--deeply-yellow); position: fixed; top:0; left:0; z-index: 3000; }
        .login-card { background: white; padding: 30px; border-radius: 30px; width: 280px; text-align: center; }
    </style>
</head>
<body>

<div id="view-login">
    <div class="login-card">
        <h1 style="margin:0 0 20px 0;">DEEPLY</h1>
        <input type="text" id="l-u" placeholder="Meno">
        <input type="password" id="l-p" placeholder="Heslo">
        <button class="btn-main" onclick="tryLogin()">VSTÚPIŤ</button>
    </div>
</div>

<div id="view-app" class="hidden">
    <header>
        <div class="logo">DEEPLY</div>
        <div style="display:flex; gap:10px;">
            <button id="b1" class="nav-btn active" onclick="showView('view-hlavna')">🏠</button>
            <button id="b3" class="nav-btn hidden" onclick="showView('view-admin')">⚙️</button>
            <button class="nav-btn" onclick="location.reload()">🚪</button>
        </div>
    </header>

    <div id="main-content">
        <div id="view-hlavna">
            <div id="dashboard-grid" class="grid"></div>
        </div>

        <div id="view-detail" class="hidden">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button onclick="showView('view-hlavna')" style="border:none; background:none; font-weight:900; font-size: 1.5em;">✕</button>
                <h2 id="det-n" style="margin:0; font-size: 1.1em; text-align:center;">-</h2>
                <div style="width:30px;"></div>
            </div>

            <div class="tab-wrapper">
                <button id="tab-zasoby" class="tab-btn active" onclick="switchTab('zasoby')">📦 ZÁSOBY</button>
                <button id="tab-checklist" class="tab-btn" onclick="switchTab('checklist')">✅ KONTROLA</button>
            </div>

            <div id="content-zasoby">
                <div id="list-items"></div>
            </div>

            <div id="content-checklist" class="hidden">
                <div id="pradlo-ui" class="hidden" style="padding:20px; background:white; border-radius:20px; text-align:center;">
                    <p style="font-weight:bold;">🧺 Zobrané špinavé prádlo?</p>
                    <div style="display:flex; gap:10px;">
                        <button id="p-ano" class="btn-main" style="background:#eee; color:black;" onclick="setPradloTmp(true)">ÁNO</button>
                        <button id="p-nie" class="btn-main" style="background:#eee; color:black;" onclick="setPradloTmp(false)">NIE</button>
                    </div>
                </div>
                <button class="btn-main" style="background:var(--check-color);" onclick="submitCheck()">ODOSLAŤ KONTROLU</button>
            </div>
        </div>

        <div id="view-admin" class="hidden">
            <div class="admin-section">
                <h3>⚙️ Správa systému</h3>
                <button class="btn-main" style="background:var(--danger);" onclick="setupInitialData()">⚠️ RESET A NAHRATIE PREVÁDZOK</button>
                <p style="font-size: 0.7em; color: gray; margin-top: 10px;">Tlačidlo vymaže staré dáta a nahraje váš zoznam (Rideta, Veternicová...).</p>
            </div>
            <div id="admin-p-list" class="admin-section">
                <h3>🏢 Zoznam prevádzok</h3>
                <div id="p-list-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "sklad-771a4.firebaseapp.com",
        databaseURL: "https://sklad-771a4-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sklad-771a4",
        storageBucket: "sklad-771a4.firebasestorage.app",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null; let mData = {}; let aktMiesto = ""; let tmpPradlo = null;

    function tryLogin() {
        const u = document.getElementById('l-u').value.trim().toLowerCase();
        const p = document.getElementById('l-p').value.trim();
        db.ref('users/'+u).once('value', s => {
            const d = s.val();
            if(d && String(d.pass) === String(p)) {
                user = { name: u, role: d.role };
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                if(d.role === 'manager') document.getElementById('b3').classList.remove('hidden');
                startApp();
            } else alert("Chyba prihlásenia.");
        });
    }

    function startApp() {
        db.ref('/').on('value', snap => {
            mData = snap.val() || { prevadzky: {} };
            renderDashboard();
            if(aktMiesto) refreshDetail();
            renderAdminList();
        });
    }

    function isWorkDay(date) {
        const d = date.getDay(); return d !== 0 && d !== 6;
    }

    function getStatus(mName) {
        const p = mData.prevadzky[mName];
        if(p._type === 'sklad') return 'status-sklad';
        if(!p.last_check) return 'status-danger';
        const last = new Date(p.last_check);
        const today = new Date();
        let diff = 0; let temp = new Date(last.getTime());
        while(temp < today) { temp.setDate(temp.getDate()+1); if(temp <= today && isWorkDay(temp)) diff++; }
        if(diff > (p.rozostup || 2)) return 'status-danger';
        if(diff === (p.rozostup || 2)) return 'status-warning';
        return 'status-ok';
    }

    function renderDashboard() {
        const grid = document.getElementById('dashboard-grid');
        grid.innerHTML = "";
        const pp = mData.prevadzky || {};
        Object.keys(pp).sort().forEach(m => {
            const status = getStatus(m);
            const prAlert = (pp[m].pradlo && pp[m].p_count >= (pp[m].p_limit || 3));
            grid.innerHTML += `<div class="karta ${status}" onclick="otvorMiesto('${m}')">
                ${prAlert ? '<div class="pradlo-badge">🧺</div>' : ''}
                <div style="font-size:1.8em;">${pp[m]._type === 'sklad' ? '📦' : '🏢'}</div>
                <div style="font-weight:bold; font-size:0.8em; margin-top:5px;">${m}</div>
                <div style="font-size:0.6em; color:#888;">${pp[m].last_check ? new Date(pp[m].last_check).toLocaleDateString() : 'Žiadna kontrola'}</div>
            </div>`;
        });
    }

    function setupInitialData() {
        if(!confirm("Vymazať všetko a nahrať prevádzky bez bodiek v názvoch?")) return;
        const init = {
            prevadzky: {
                "Veternicova 20 - ranna": { rozostup: 2, pradlo: false, _type: "prevadzka" },
                "Veternicova 20 - poobedna": { rozostup: 2, pradlo: false, _type: "prevadzka" },
                "Rideta": { rozostup: 2, pradlo: true, p_limit: 3, p_count: 0, _type: "prevadzka" },
                "ProDiagnostic Group - 14 posch": { rozostup: 2, pradlo: true, p_limit: 5, p_count: 0, _type: "prevadzka" },
                "Dr Magnet": { rozostup: 2, pradlo: true, p_limit: 4, p_count: 0, _type: "prevadzka" },
                "Skola sv Frantiska": { rozostup: 7, pradlo: false, _type: "prevadzka" },
                "Skolka Lachova": { rozostup: 7, pradlo: false, _type: "prevadzka" },
                "HLAVNY SKLAD": { _type: "sklad" }
            },
            users: { "admin": { pass: "admin123", role: "manager" } },
            katalog: ["Jar 1L", "Mydlo 5L", "Papier TOAL", "Mop", "Handra"]
        };
        db.ref('/').set(init).then(() => { alert("Úspešne nahraté!"); location.reload(); });
    }

    function otvorMiesto(m) { aktMiesto = m; tmpPradlo = null; showView('view-detail'); document.getElementById('det-n').innerText = m; switchTab('zasoby'); }
    
    function refreshDetail() {
        const p = mData.prevadzky[aktMiesto];
        document.getElementById('pradlo-ui').classList.toggle('hidden', !p.pradlo);
        const list = document.getElementById('list-items');
        list.innerHTML = "";
        Object.keys(p).forEach(k => { if(!k.startsWith('_') && !['last_check','rozostup','pradlo','p_limit','p_count','_type'].includes(k)) {
            list.innerHTML += `<div class="item-row"><span>${k}</span><b>${p[k]}</b></div>`;
        }});
    }

    function setPradloTmp(v) { tmpPradlo = v; document.getElementById('p-ano').style.background = v ? 'var(--check-color)' : '#eee'; document.getElementById('p-nie').style.background = !v ? 'var(--danger)' : '#eee'; }

    function submitCheck() {
        const p = mData.prevadzky[aktMiesto];
        if(p.pradlo && tmpPradlo === null) return alert("Označte prádlo!");
        const up = {}; const now = new Date().toISOString();
        up[`prevadzky/${aktMiesto}/last_check`] = now;
        if(p.pradlo) { up[`prevadzky/${aktMiesto}/p_count`] = tmpPradlo ? 0 : (p.p_count || 0) + 1; }
        db.ref().update(up).then(() => { alert("OK"); showView('view-hlavna'); });
    }

    function renderAdminList() {
        const cont = document.getElementById('p-list-container'); if(!cont) return;
        cont.innerHTML = "";
        Object.keys(mData.prevadzky || {}).forEach(p => {
            cont.innerHTML += `<div style="padding:5px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">${p} <button onclick="db.ref('prevadzky/${p}').remove()">✕</button></div>`;
        });
    }

    function showView(id) {
        ['view-hlavna', 'view-detail', 'view-admin'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('b1').classList.toggle('active', id==='view-hlavna');
        document.getElementById('b3').classList.toggle('active', id==='view-admin');
    }

    function switchTab(t) {
        document.getElementById('content-zasoby').classList.toggle('hidden', t!=='zasoby');
        document.getElementById('content-checklist').classList.toggle('hidden', t!=='checklist');
        document.getElementById('tab-zasoby').classList.toggle('active', t==='zasoby');
        document.getElementById('tab-checklist').classList.toggle('active', t==='checklist');
    }

    db.ref('users/admin').update({pass:'admin123', role:'manager'});
</script>
</body>
</html>

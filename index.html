<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEEPLY System</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --yellow: #FFD700; --dark: #1a1a1a; --bg: #f4f4f4; --red: #e74c3c; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--dark); }
        header { background: var(--yellow); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-btn { background: rgba(0,0,0,0.1); border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; margin-bottom: 12px; padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; background: var(--dark); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .qty-ctrl { display: flex; gap: 10px; align-items: center; }
        .btn-qty { width: 40px; height: 40px; border-radius: 10px; border: none; background: #ddd; font-size: 20px; font-weight: bold; }
        .hidden { display: none !important; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.1); margin-left: 5px; }
        #view-login { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--yellow); }
    </style>
</head>
<body>

<div id="view-login">
    <div style="background:white; padding:30px; border-radius:25px; width:280px; text-align:center;">
        <h2 style="margin-top:0;">DEEPLY</h2>
        <input type="text" id="l-u" placeholder="Meno">
        <input type="password" id="l-p" placeholder="Heslo">
        <button class="btn" onclick="tryLogin()">VSTÚPIŤ</button>
    </div>
</div>

<div id="view-app" class="hidden">
    <header>
        <div><span style="font-weight:900;">DEEPLY</span><span id="user-tag" class="tag"></span></div>
        <div style="display:flex; gap:8px;">
            <button id="admin-btn" class="nav-btn hidden" onclick="showView('view-admin')">⚙️</button>
            <button class="nav-btn" onclick="location.reload()">🚪</button>
        </div>
    </header>

    <div class="container">
        <div id="view-list">
            <h3>Prevádzky</h3>
            <div id="p-list"></div>
        </div>

        <div id="view-detail" class="hidden">
            <button onclick="showView('view-list')" style="background:none; border:none; font-weight:bold; cursor:pointer; margin-bottom:15px;">← SPÄŤ</button>
            <h2 id="det-title">-</h2>
            <div class="card">
                <div id="det-items"></div>
                <div id="manager-tools" class="hidden" style="margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
                    <input type="text" id="new-it-name" placeholder="Názov novej položky">
                    <button class="btn" onclick="dbAddItem()">PRIDAŤ POLOŽKU</button>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden">
            <button onclick="showView('view-list')" style="background:none; border:none; font-weight:bold; cursor:pointer; margin-bottom:15px;">← SPÄŤ</button>
            <h2>Administrácia</h2>
            <div class="card">
                <h4>Správa užívateľov</h4>
                <input type="text" id="adm-u-name" placeholder="Meno (napr. partner)">
                <input type="text" id="adm-u-pass" placeholder="Heslo">
                <select id="adm-u-role">
                    <option value="supervisor">Supervisor</option>
                    <option value="upratovac">Upratovač</option>
                    <option value="manager">Manager</option>
                </select>
                <button class="btn" onclick="dbAddUser()">VYTVORIŤ UŽÍVATEĽA</button>
                <div id="user-list-ui" style="margin-top:20px;"></div>
            </div>
            
            <div class="card">
                <h4>Nová prevádzka</h4>
                <input type="text" id="adm-p-name" placeholder="Názov skladu">
                <button class="btn" onclick="dbAddP()">VYTVORIŤ SKLAD</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "deeply-72541.firebaseapp.com",
        databaseURL: "https://deeply-72541-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "deeply-72541",
        storageBucket: "deeply-72541.firebasestorage.app",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let aktP = "";

    function tryLogin() {
        const u = document.getElementById('l-u').value.trim().toLowerCase();
        const p = document.getElementById('l-p').value.trim();
        db.ref('users/' + u).once('value', snap => {
            const d = snap.val();
            if (d && String(d.pass) === String(p)) {
                currentUser = { name: u, role: d.role };
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('user-tag').innerText = d.role.toUpperCase();
                
                // Manager vidí Admin tlačidlo a nástroje v sklade
                if(d.role === 'manager') {
                    document.getElementById('admin-btn').classList.remove('hidden');
                    document.getElementById('manager-tools').classList.remove('hidden');
                    loadUsersList();
                }
                initApp();
            } else { alert("Nesprávne údaje."); }
        });
    }

    function initApp() {
        db.ref('prevadzky').on('value', snap => {
            const list = document.getElementById('p-list');
            list.innerHTML = "";
            Object.keys(snap.val() || {}).forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<strong>📦 ${p}</strong>`;
                div.onclick = () => openP(p);
                list.appendChild(div);
            });
        });
    }

    function openP(p) {
        aktP = p;
        showView('view-detail');
        document.getElementById('det-title').innerText = p;
        db.ref('prevadzky/' + p).on('value', snap => {
            const items = snap.val() || {};
            const cont = document.getElementById('det-items');
            cont.innerHTML = "";
            Object.keys(items).filter(k => !k.startsWith('_')).forEach(it => {
                cont.innerHTML += `<div class="item-row"><span>${it}</span><div class="qty-ctrl"><button class="btn-qty" onclick="changeQty('${it}',-1)">-</button><b>${items[it]}</b><button class="btn-qty" onclick="changeQty('${it}',1)">+</button></div></div>`;
            });
        });
    }

    function changeQty(it, d) { db.ref(`prevadzky/${aktP}/${it}`).transaction(c => (c || 0) + d); }

    function loadUsersList() {
        db.ref('users').on('value', snap => {
            const cont = document.getElementById('user-list-ui');
            cont.innerHTML = "<strong>Zoznam užívateľov:</strong><br>";
            const users = snap.val() || {};
            Object.keys(users).forEach(u => {
                // Hlavný manager sa nedá vymazať, ostatní áno
                const canDel = u !== 'manager' && u !== currentUser.name;
                cont.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee;">
                    <span>${u} (${users[u].role})</span>
                    ${canDel ? `<button onclick="dbDelUser('${u}')" style="color:red; border:none; background:none; cursor:pointer;">✖ Vymazať</button>` : ''}
                </div>`;
            });
        });
    }

    function dbAddUser() {
        const u = document.getElementById('adm-u-name').value.trim().toLowerCase();
        const p = document.getElementById('adm-u-pass').value.trim();
        const r = document.getElementById('adm-u-role').value;
        if(u && p) db.ref('users/' + u).set({ pass: p, role: r }).then(() => {
            document.getElementById('adm-u-name').value = "";
            document.getElementById('adm-u-pass').value = "";
        });
    }

    function dbDelUser(u) { if(confirm("Naozaj vymazať?")) db.ref('users/' + u).remove(); }
    function dbAddP() { const n = document.getElementById('adm-p-name').value.trim(); if(n) db.ref('prevadzky/' + n).set({ _init: true }); }
    function dbAddItem() { const n = document.getElementById('new-it-name').value.trim(); if(n) db.ref(`prevadzky/${aktP}/${n}`).set(0); }
    function showView(id) { ['view-list', 'view-detail', 'view-admin'].forEach(v => document.getElementById(v).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
</script>
</body>
</html>

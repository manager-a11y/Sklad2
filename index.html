<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEEPLY Sklad & Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --deeply-yellow: #FFD700; --deeply-dark: #1a1a1a; --bg: #f4f4f4; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--deeply-dark); }
        
        /* LOGIN */
        #view-login { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--deeply-yellow); }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* APP */
        header { background: var(--deeply-yellow); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-btn { background: rgba(0,0,0,0.1); border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; margin-bottom: 12px; padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; background: var(--deeply-dark); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-red { background: #e74c3c; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .qty-btns { display: flex; gap: 10px; align-items: center; }
        .btn-qty { width: 40px; height: 40px; border-radius: 10px; border: none; background: #eee; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        .hidden { display: none !important; }
        .admin-section { background: #fff; padding: 20px; border-radius: 15px; margin-top: 20px; border: 2px solid var(--deeply-yellow); }
    </style>
</head>
<body>

<div id="view-login">
    <div class="login-box">
        <h2 style="margin-top:0;">DEEPLY</h2>
        <input type="text" id="l-u" placeholder="Užívateľské meno">
        <input type="password" id="l-p" placeholder="Heslo">
        <button class="btn" onclick="tryLogin()">PRIHLÁSIŤ SA</button>
        <p id="l-err" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="view-app" class="hidden">
    <header>
        <span style="font-weight:900; letter-spacing: -1px;">DEEPLY SYSTEM</span>
        <div style="display:flex; gap:10px;">
            <button id="admin-toggle" class="nav-btn hidden" onclick="showView('view-admin')">⚙️ Admin</button>
            <button class="nav-btn" onclick="location.reload()">🚪</button>
        </div>
    </header>

    <div class="container">
        <div id="view-list">
            <h3 style="margin-top:0;">Moje prevádzky</h3>
            <div id="p-list"></div>
        </div>

        <div id="view-detail" class="hidden">
            <button onclick="showView('view-list')" style="background:none; border:none; color:#666; font-weight:bold; cursor:pointer; padding:0; margin-bottom:15px;">← SPÄŤ NA ZOZNAM</button>
            <h2 id="det-title" style="margin:0 0 20px 0;">-</h2>
            <div id="det-items" style="background:white; border-radius:15px; padding:15px;"></div>
        </div>

        <div id="view-admin" class="hidden">
            <button onclick="showView('view-list')" style="background:none; border:none; color:#666; font-weight:bold; cursor:pointer; padding:0; margin-bottom:15px;">← SPÄŤ</button>
            <h2>Správa systému</h2>
            
            <div class="admin-section">
                <h4>Pridať nového užívateľa</h4>
                <input type="text" id="adm-u-name" placeholder="Meno (napr. jano)">
                <input type="text" id="adm-u-pass" placeholder="Heslo">
                <button class="btn" onclick="dbAddUser()">ULOŽIŤ UŽÍVATEĽA</button>
            </div>

            <div class="admin-section">
                <h4>Vytvoriť novú prevádzku</h4>
                <input type="text" id="adm-p-name" placeholder="Názov (napr. Sklad Trnava)">
                <button class="btn" onclick="dbAddP()">VYTVORIŤ PREVÁDZKU</button>
            </div>
        </div>
    </div>
</div>

<script>
    // KONFIGURÁCIA (deeply-72541)
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "deeply-72541.firebaseapp.com",
        databaseURL: "https://deeply-72541-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "deeply-72541",
        storageBucket: "deeply-72541.firebasestorage.app",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userRole = "";
    let aktP = "";

    // PRIHLÁSENIE
    function tryLogin() {
        const u = document.getElementById('l-u').value.trim().toLowerCase();
        const p = document.getElementById('l-p').value.trim();
        const err = document.getElementById('l-err');

        db.ref('users/' + u).once('value', snap => {
            if (snap.exists() && String(snap.val()) === String(p)) {
                userRole = u;
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                
                // Ak je manager, ukáž Admin tlačidlo
                if(u === 'manager') document.getElementById('admin-toggle').classList.remove('hidden');
                
                initApp();
            } else {
                err.innerText = "Nesprávne meno alebo heslo.";
            }
        });
    }

    // NAČÍTANIE DÁT
    function initApp() {
        db.ref('prevadzky').on('value', snap => {
            const list = document.getElementById('p-list');
            list.innerHTML = "";
            const data = snap.val() || {};
            
            Object.keys(data).forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<strong>📦 ${p}</strong>`;
                div.onclick = () => openP(p);
                list.appendChild(div);
            });
            if(aktP) openP(aktP);
        });
    }

    // DETAIL SKLADU
    function openP(p) {
        aktP = p;
        showView('view-detail');
        document.getElementById('det-title').innerText = p;
        
        db.ref('prevadzky/' + p).on('value', snap => {
            const items = snap.val() || {};
            const container = document.getElementById('det-items');
            container.innerHTML = "";
            
            Object.keys(items).filter(k => !k.startsWith('_')).forEach(it => {
                container.innerHTML += `
                    <div class="item-row">
                        <span>${it}</span>
                        <div class="qty-btns">
                            <button class="btn-qty" onclick="changeQty('${it}', -1)">-</button>
                            <span style="min-width:30px; text-align:center; font-weight:bold;">${items[it]}</span>
                            <button class="btn-qty" onclick="changeQty('${it}', 1)">+</button>
                        </div>
                    </div>`;
            });
            
            // Možnosť pridať novú položku (len pre managera)
            if(userRole === 'manager') {
                container.innerHTML += `
                    <div style="margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
                        <input type="text" id="new-it-name" placeholder="Názov novej položky">
                        <button class="btn" style="padding:10px;" onclick="dbAddItem()">+ PRIDAŤ POLOŽKU</button>
                    </div>`;
            }
        });
    }

    function changeQty(it, d) {
        db.ref(`prevadzky/${aktP}/${it}`).transaction(c => (c || 0) + d);
    }

    // ADMIN FUNKCIE
    function dbAddUser() {
        const name = document.getElementById('adm-u-name').value.trim().toLowerCase();
        const pass = document.getElementById('adm-u-pass').value.trim();
        if(!name || !pass) return alert("Vyplň všetko.");
        
        db.ref('users/' + name).set(pass).then(() => {
            alert('Užívateľ pridaný.');
            document.getElementById('adm-u-name').value = "";
            document.getElementById('adm-u-pass').value = "";
        });
    }

    function dbAddP() {
        const name = document.getElementById('adm-p-name').value.trim();
        if(!name) return;
        db.ref('prevadzky/' + name).set({ "_init": true }).then(() => {
            alert('Prevádzka vytvorená.');
            document.getElementById('adm-p-name').value = "";
            showView('view-list');
        });
    }

    function dbAddItem() {
        const name = document.getElementById('new-it-name').value.trim();
        if(!name) return;
        db.ref(`prevadzky/${aktP}/${name}`).set(0);
    }

    // NAVIGÁCIA
    function showView(id) {
        ['view-list', 'view-detail', 'view-admin'].forEach(v => {
            document.getElementById(v).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>

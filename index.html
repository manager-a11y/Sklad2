<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEEPLY - Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --deeply-yellow: #FFD700; --deeply-dark: #1a1a1a; --bg: #f4f4f4; --danger: #e74c3c; --check-color: #27ae60; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); }
        
        /* Login Screen */
        #view-login { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; background: var(--deeply-yellow); box-sizing: border-box; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* App Layout */
        header { position: sticky; top: 0; background: var(--deeply-yellow); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .nav-btn { background: rgba(0,0,0,0.05); border: none; padding: 10px; border-radius: 10px; font-weight: bold; }
        .nav-btn.active { background: var(--deeply-dark); color: white; }
        #main-content { padding: 15px; padding-bottom: 160px; }
        
        /* Components */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .karta { background: white; padding: 20px; border-radius: 18px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        input, select, .btn-main { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn-main { background: var(--deeply-dark); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .item-row { background: white; margin-bottom: 10px; padding: 15px; border-radius: 15px; }
        .tab-wrapper { display: flex; background: #eee; border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-weight: bold; background: none; color: #666; font-size: 0.8em; }
        .tab-btn.active { background: white; color: var(--deeply-dark); }
        
        .check-item { display: flex; align-items: center; background: white; padding: 15px; border-radius: 15px; margin-bottom: 8px; gap: 12px; border-left: 5px solid #ddd; }
        .check-item.done { border-left-color: var(--check-color); background: #f0fff4; }
        .checkbox-custom { width: 22px; height: 22px; border: 2px solid #ddd; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .done .checkbox-custom { background: var(--check-color); color: white; border-color: var(--check-color); }
        
        .kosik-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--deeply-dark); color: white; padding: 20px; z-index: 2000; border-top-left-radius: 20px; border-top-right-radius: 20px; }
    </style>
</head>
<body>

<div id="view-login">
    <div class="login-box">
        <h2 style="text-align:center; margin-top:0;">DEEPLY App</h2>
        <input type="email" id="login-email" placeholder="E-mail">
        <input type="password" id="login-pass" placeholder="Heslo">
        <button class="btn-main" onclick="handleLogin()">PRIHLÁSIŤ SA</button>
        <p id="login-error" style="color:red; font-size:0.8em; text-align:center;"></p>
    </div>
</div>

<div id="view-app" class="hidden">
    <header>
        <div class="logo">DEEPLY</div>
        <div style="display:flex; gap:5px;">
            <button id="b1" class="nav-btn active" onclick="showView('view-hlavna')">🏠</button>
            <button id="b2" class="nav-btn" onclick="showView('view-history')">📜</button>
            <button id="b3" class="nav-btn admin-only hidden" onclick="showView('view-admin')">⚙️</button>
            <button class="nav-btn" onclick="handleLogout()">🚪</button>
        </div>
    </header>

    <div id="main-content">
        <div id="view-hlavna">
            <div class="grid" id="grid-sklady"></div>
            <div style="margin-top:20px;" class="grid" id="grid-prevadzky"></div>
        </div>

        <div id="view-detail" class="hidden">
            <button onclick="showView('view-hlavna')" style="border:none; background:none; font-weight:bold; margin-bottom:15px;">← SPÄŤ</button>
            <h2 id="det-n">-</h2>
            <div class="tab-wrapper">
                <button id="tab-zasoby" class="tab-btn active" onclick="switchTab('zasoby')">ZÁSOBY</button>
                <button id="tab-checklist" class="tab-btn" onclick="switchTab('checklist')">CHECKLIST</button>
                <button id="tab-logy" class="tab-btn" onclick="switchTab('logy')">HISTÓRIA</button>
            </div>
            
            <div id="content-zasoby">
                <div class="admin-only hidden" style="background:#fff; padding:10px; border-radius:15px; margin-bottom:15px;">
                    <select id="sel-pridat-tovar"></select>
                    <button onclick="pridajZKatalogu()" class="btn-main" style="margin:0;">+ PRIDAŤ TOVAR</button>
                </div>
                <div id="list-mat"></div><div id="list-tool"></div>
            </div>

            <div id="content-checklist" class="hidden">
                <div id="list-check"></div>
                <button class="admin-only hidden" onclick="showView('view-check-setup')" style="width:100%; margin-top:10px; padding:10px;">⚙️ Nastaviť úlohy</button>
            </div>

            <div id="content-logy" class="hidden">
                <div id="miestne-logy"></div>
            </div>
        </div>

        <div id="view-check-setup" class="hidden">
            <button onclick="showView('view-detail')" style="border:none; background:none; font-weight:bold; margin-bottom:20px;">← HOTOVO</button>
            <div id="setup-tasks-list"></div>
        </div>

        <div id="view-history" class="hidden">
            <h3>História pohybov</h3>
            <div id="list-hist"></div>
        </div>

        <div id="view-admin" class="hidden">
            <h3>Administrácia</h3>
            <div style="background:white; padding:15px; border-radius:15px;">
                <h4>Nový tovar</h4>
                <input type="text" id="add-i-name" placeholder="Názov">
                <select id="add-i-type"><option value="material">Materiál</option><option value="pomocka">Pomôcka</option></select>
                <button class="btn-main" onclick="addKatalog()">PRIDAŤ</button>
                <div id="adm-i-list"></div>
            </div>
        </div>
    </div>
</div>

<div id="kosik-bar" class="kosik-bar hidden">
    <div id="kosik-text" style="font-size:0.8em; margin-bottom:10px;"></div>
    <div style="display:flex; gap:10px;">
        <select id="kosik-kam"></select>
        <button onclick="potvrd()" style="background:var(--deeply-yellow); border:none; padding:10px 20px; border-radius:10px; font-weight:bold; color:black;">OK</button>
        <button onclick="zrus()" style="background:none; border:1px solid white; color:white; border-radius:10px;">✕</button>
    </div>
</div>

<script>
    // TVOJA KONFIGURÁCIA (ponechaj tú istú)
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "sklad-771a4.firebaseapp.com",
        databaseURL: "https://sklad-771a4-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sklad-771a4",
        storageBucket: "sklad-771a4.firebasestorage.app",
        messagingSenderId: "566464602816",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let mData = {}; let kat = {}; let tasks = {}; let globHist = {}; let aktMiesto = ""; let kosik = {};
    let isAdmin = false;

    // LOGIN LOGIKA
    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => {
            document.getElementById('login-error').innerText = "Nesprávne údaje.";
        });
    }

    function handleLogout() { auth.signOut(); location.reload(); }

    auth.onAuthStateChanged(user => {
        if (user) {
            // TU SI URČI SVOJ EMAIL AKO ADMINA
            isAdmin = (user.email === 'tvoj-email@gmail.com'); 
            
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-app').classList.remove('hidden');
            
            if(isAdmin) {
                document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
            }

            // Spustenie sledovania dát
            db.ref('/').on('value', snap => {
                const d = snap.val() || {};
                mData = d.prevadzky || {}; kat = d.materialy || {}; 
                tasks = d.tasks || {}; globHist = d.historia || {};
                renderDash(); renderAdmin(); renderHist(globHist); if(aktMiesto) refreshDetail();
            });
        } else {
            document.getElementById('view-login').classList.remove('hidden');
            document.getElementById('view-app').classList.add('hidden');
        }
    });

    // --- ZVYŠOK TVOJEJ LOGIKY (renderDash, vloz, potvrd, atď.) ---
    // (Z dôvodu dĺžky som sem vložil len kľúčové zmeny, zvyšné funkcie zostávajú rovnaké ako v predošlej správe)
    // Dôležitá zmena: V oprav(it) a zmazMiestnyTovar(it) pridaj check: if(!isAdmin) return;

    function renderDash() {
        const gs = document.getElementById('grid-sklady'); const gp = document.getElementById('grid-prevadzky');
        gs.innerHTML = ""; gp.innerHTML = "";
        Object.keys(mData).sort().forEach(m => {
            const h = `<div class="karta" onclick="otvorMiesto('${m}')">
                <div style="font-size:1.5em;">${m.toLowerCase().includes('sklad') ? '📦' : '🏢'}</div>
                <strong>${m}</strong>
            </div>`;
            if(m.toLowerCase().includes('sklad')) gs.innerHTML += h; else gp.innerHTML += h;
        });
    }

    function otvorMiesto(m) { aktMiesto = m; showView('view-detail'); document.getElementById('det-n').innerText = m; refreshDetail(); }

    function refreshDetail() {
        const lm = document.getElementById('list-mat'); const lt = document.getElementById('list-tool');
        lm.innerHTML = '<h4>Materiál</h4>'; lt.innerHTML = '<h4>Pomôcky</h4>';
        const d = mData[aktMiesto] || {};
        
        Object.keys(d).filter(k => !['_init','posledna_kontrola','checks','enabledTasks'].includes(k)).forEach(it => {
            const val = d[it] || 0;
            const h = `<div class="item-row">
                <div style="display:flex; justify-content:space-between;"><strong>${it}</strong> <span>${val} ks</span></div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <button class="nav-btn" onclick="vloz('${it}', 1)">+1</button>
                    <button class="nav-btn" onclick="vloz('${it}', -1)" ${val<=0?'disabled':''}>-1</button>
                    ${isAdmin ? `<button onclick="oprav('${it}')" style="border:none; background:none;">✏️</button>` : ''}
                </div>
            </div>`;
            const info = Object.values(kat).find(x => x.name === it) || {type:'material'};
            if(info.type === 'pomocka') lt.innerHTML += h; else lm.innerHTML += h;
        });

        // Checklist Rendering
        const lc = document.getElementById('list-check'); lc.innerHTML = "";
        const enabled = d.enabledTasks || {}; const savedChecks = d.checks || {};
        Object.keys(tasks).forEach(tid => {
            if(enabled[tid]) {
                const done = savedChecks[tid] ? 'done' : '';
                lc.innerHTML += `<div class="check-item ${done}" onclick="toggleCheck('${tid}')">
                    <div class="checkbox-custom">${done ? '✓' : ''}</div><div>${tasks[tid].text}</div>
                </div>`;
            }
        });

        // Kontroly History
        const ml = document.getElementById('miestne-logy'); ml.innerHTML = "";
        Object.values(globHist).filter(h => h.odkial === "CHECKLIST" && h.kam === aktMiesto).reverse().forEach(l => {
            ml.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee; font-size:0.8em;">✅ ${l.datum}</div>`;
        });
        
        // Populate "Move to" select
        const s = document.getElementById('kosik-kam'); s.innerHTML = `<option value="PRIJEM">DODÁVATEĽ</option>`;
        Object.keys(mData).filter(x => x !== aktMiesto).forEach(x => s.innerHTML += `<option value="${x}">${x}</option>`);
    }

    function toggleCheck(tid) {
        const d = mData[aktMiesto];
        const newStatus = !((d.checks && d.checks[tid]) || false);
        db.ref(`prevadzky/${aktMiesto}/checks/${tid}`).set(newStatus).then(() => {
            if(newStatus) checkCompletion();
        });
    }

    function checkCompletion() {
        const d = mData[aktMiesto];
        const enabledKeys = Object.keys(d.enabledTasks || {}).filter(k => d.enabledTasks[k] === true);
        db.ref(`prevadzky/${aktMiesto}/checks`).once('value', snap => {
            const currentChecks = snap.val() || {};
            if(enabledKeys.every(k => currentChecks[k] === true)) {
                const cas = new Date().toLocaleString('sk-SK');
                db.ref('historia').push({ datum: cas, odkial: "CHECKLIST", kam: aktMiesto, polozky: "Kontrola OK" });
                db.ref(`prevadzky/${aktMiesto}/posledna_kontrola`).set(cas);
            }
        });
    }

    function vloz(it, q) {
        kosik[it] = (kosik[it] || 0) + q; if(kosik[it] === 0) delete kosik[it];
        const bar = document.getElementById('kosik-bar');
        if(Object.keys(kosik).length > 0) {
            bar.classList.remove('hidden'); document.getElementById('kosik-text').innerText = Object.keys(kosik).map(x => `${kosik[x]}x ${x}`).join(', ');
        } else bar.classList.add('hidden');
    }

    function potvrd() {
        const kam = document.getElementById('kosik-kam').value; const up = {}; const l = [];
        Object.keys(kosik).forEach(it => {
            const q = kosik[it];
            if(kam === "PRIJEM") up[`prevadzky/${aktMiesto}/${it}`] = (mData[aktMiesto][it] || 0) + q;
            else { up[`prevadzky/${aktMiesto}/${it}`] = (mData[aktMiesto][it] || 0) - q; up[`prevadzky/${kam}/${it}`] = (mData[kam][it] || 0) + q; }
            l.push(`${q}x ${it}`);
        });
        const cas = new Date().toLocaleString('sk-SK');
        up[`historia/${Date.now()}`] = { datum: cas, odkial: kam==="PRIJEM"?"DODÁVKA":aktMiesto, kam: kam==="PRIJEM"?aktMiesto:kam, polozky: l.join(', ') };
        db.ref().update(up).then(() => { kosik = {}; document.getElementById('kosik-bar').classList.add('hidden'); });
    }

    function zrus() { kosik = {}; document.getElementById('kosik-bar').classList.add('hidden'); }
    
    function showView(id) {
        ['view-hlavna', 'view-detail', 'view-history', 'view-admin', 'view-check-setup'].forEach(v => {
            const el = document.getElementById(v); if(el) el.classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    function switchTab(t) {
        ['zasoby', 'checklist', 'logy'].forEach(tab => {
            document.getElementById('content-'+tab).classList.toggle('hidden', t !== tab);
            document.getElementById('tab-'+tab).classList.toggle('active', t === tab);
        });
    }
    
    // Admin functions (simplifikované pre dĺžku kódu)
    function addKatalog() { 
        const n = document.getElementById('add-i-name').value; 
        const t = document.getElementById('add-i-type').value;
        if(n && isAdmin) db.ref('materialy').push({name:n, type:t}); 
    }
    
    function renderAdmin() {
        if(!isAdmin) return;
        document.getElementById('adm-i-list').innerHTML = Object.keys(kat).map(id => `<div>${kat[id].name} <button onclick="db.ref('materialy/${id}').remove()">✕</button></div>`).join('');
    }

    function renderHist(h) {
        document.getElementById('list-hist').innerHTML = Object.values(h).reverse().slice(0, 20).map(x => `<div style="font-size:0.8em; margin-bottom:5px;">${x.datum} | ${x.odkial} -> ${x.kam}</div>`).join('');
    }
</script>
</body>
</html>

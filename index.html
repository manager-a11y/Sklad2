<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>DEEPLY Sklad</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --deeply-yellow: #FFD700; --deeply-dark: #1a1a1a; --mat-bg: #e3f2fd; --tool-bg: #f3e5f5; --bg: #f5f5f5; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--deeply-dark); }
        
        header { position: sticky; top: 0; background: var(--deeply-yellow); padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100; }
        .logo { font-weight: 900; font-size: 1.3em; letter-spacing: 1px; }
        
        #main-content { padding: 15px; padding-bottom: 150px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .karta { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .last-check { font-size: 0.7em; color: #777; display: block; margin-top: 5px; }

        /* Rozdelenie kategórií */
        .kat-section { margin-top: 20px; border-radius: 15px; overflow: hidden; }
        .kat-header { padding: 10px 15px; font-weight: bold; font-size: 0.9em; display: flex; align-items: center; gap: 8px; }
        .mat-header { background: #bbdefb; color: #0d47a1; }
        .tool-header { background: #e1bee7; color: #4a148c; }
        
        .item-row { background: white; padding: 15px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        .item-info { display: flex; justify-content: space-between; align-items: center; }
        .item-name { font-weight: bold; }
        .item-qty { font-weight: 900; color: #2c3e50; }
        
        .item-actions { display: flex; gap: 5px; }
        .btn-q { flex: 1; padding: 12px; border: none; background: #f0f0f0; border-radius: 8px; font-weight: bold; }
        .btn-edit { background: none; border: none; font-size: 1.2em; }

        .kosik-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--deeply-dark); color: white; padding: 15px; z-index: 200; border-top: 5px solid var(--deeply-yellow); }
        #btn-potvrdit { background: var(--deeply-yellow); color: var(--deeply-dark); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">DEEPLY</div>
    <div style="display:flex; gap:10px;">
        <button onclick="showView('view-home')" style="border:none; background:none; font-size:1.5em;">🏠</button>
        <button onclick="showView('view-admin')" style="border:none; background:none; font-size:1.5em;">⚙️</button>
    </div>
</header>

<div id="main-content">
    <div id="view-home">
        <h4 style="color:#777; margin: 10px 0;">SKLADY A PREVÁDZKY</h4>
        <div id="grid-miesta" class="grid"></div>
    </div>

    <div id="view-detail" class="hidden">
        <button onclick="showView('view-home')" style="background:none; border:none; color:#777; font-weight:bold; margin-bottom:15px;">← SPÄŤ</button>
        <h2 id="nadpis-miesto" style="margin:0 0 20px 0;">-</h2>
        
        <div class="kat-section">
            <div class="kat-header mat-header">💧 MATERIÁL</div>
            <div id="list-material"></div>
        </div>

        <div class="kat-section" style="margin-top:20px;">
            <div class="kat-header tool-header">🛠️ POMÔCKY</div>
            <div id="list-pomocky"></div>
        </div>
    </div>

    <div id="view-admin" class="hidden">
        <h3>Administrácia</h3>
        <input type="text" id="new-item-name" placeholder="Názov tovaru" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <select id="new-item-type" style="width:100%; padding:10px; margin-bottom:10px;">
            <option value="material">Materiál</option>
            <option value="pomocka">Pomôcka</option>
        </select>
        <button onclick="addKatalog()" style="width:100%; padding:10px; background:var(--deeply-yellow); border:none; font-weight:bold;">Pridať do katalógu</button>
    </div>
</div>

<div id="kosik-bar" class="kosik-bar hidden">
    <div id="kosik-text" style="font-size: 0.9em;"></div>
    <select id="sel-kam" style="width:100%; padding:8px; margin-top:10px; border-radius:5px;"></select>
    <button id="btn-potvrdit" onclick="vykonatPohyb()">POTVRDIŤ POHYB</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "sklad-771a4.firebaseapp.com",
        databaseURL: "https://sklad-771a4-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sklad-771a4",
        storageBucket: "sklad-771a4.firebasestorage.app",
        messagingSenderId: "566464602816",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let mData = {}; let kat = {}; let aktMiesto = ""; let kosik = {};

    db.ref('/').on('value', snap => {
        const d = snap.val() || {};
        mData = d.prevadzky || {};
        kat = d.materialy || {};
        renderHome();
        if(aktMiesto) refreshDetail();
    });

    function renderHome() {
        const g = document.getElementById('grid-miesta'); g.innerHTML = "";
        Object.keys(mData).sort().forEach(m => {
            const last = mData[m].posledna_kontrola || "---";
            g.innerHTML += `<div class="karta" onclick="otvorMiesto('${m}')">
                <div style="font-size:2em;">${m.toLowerCase().includes('sklad') ? '📦' : '🏢'}</div>
                <div style="font-weight:bold;">${m}</div>
                <span class="last-check">Kontrola: ${last}</span>
            </div>`;
        });
    }

    function otvorMiesto(m) { aktMiesto = m; showView('view-detail'); document.getElementById('nadpis-miesto').innerText = m; refreshDetail(); }

    function refreshDetail() {
        const lM = document.getElementById('list-material'); lM.innerHTML = "";
        const lP = document.getElementById('list-pomocky'); lP.innerHTML = "";
        const d = mData[aktMiesto] || {};

        Object.keys(d).filter(k => !['_init','posledna_kontrola'].includes(k)).sort().forEach(it => {
            const info = Object.values(kat).find(x => x.name === it) || {type:'material'};
            const html = `<div class="item-row">
                <div class="item-info"><span class="item-name">${it}</span><span class="item-qty">${d[it]} ks</span></div>
                <div class="item-actions">
                    <button class="btn-q" onclick="zmenKosik('${it}', 1)">+1</button>
                    <button class="btn-q" onclick="zmenKosik('${it}', -1)">-1</button>
                    <button class="btn-edit" onclick="oprav('${it}')">✏️</button>
                </div>
            </div>`;
            if(info.type === 'pomocka') lP.innerHTML += html; else lM.innerHTML += html;
        });

        const s = document.getElementById('sel-kam'); s.innerHTML = `<option value="PRIJEM">PRÍJEM (Dodávateľ)</option>`;
        Object.keys(mData).filter(x => x !== aktMiesto).sort().forEach(x => { s.innerHTML += `<option value="${x}">ODSLAŤ DO: ${x}</option>`; });
    }

    function zmenKosik(it, q) {
        kosik[it] = (kosik[it] || 0) + q; if(kosik[it] === 0) delete kosik[it];
        const bar = document.getElementById('kosik-bar');
        const keys = Object.keys(kosik);
        if(keys.length > 0) {
            bar.classList.remove('hidden');
            document.getElementById('kosik-text').innerText = "Pripravené: " + keys.map(k => `${kosik[k]}x ${k}`).join(', ');
        } else bar.classList.add('hidden');
    }

    function vykonatPohyb() {
        const kam = document.getElementById('sel-kam').value;
        const up = {}; const log = []; const cas = new Date().toLocaleString('sk-SK');
        Object.keys(kosik).forEach(it => {
            const q = kosik[it];
            if(kam === "PRIJEM") { up[`prevadzky/${aktMiesto}/${it}`] = (mData[aktMiesto][it] || 0) + q; }
            else { 
                up[`prevadzky/${aktMiesto}/${it}`] = (mData[aktMiesto][it] || 0) - q;
                up[`prevadzky/${kam}/${it}`] = (mData[kam][it] || 0) + q;
            }
            log.push(`${q}x ${it}`);
        });
        up[`historia/${Date.now()}`] = { datum: cas, odkial: kam==="PRIJEM"?"DODÁVKA":aktMiesto, kam: kam==="PRIJEM"?aktMiesto:kam, polozky: log.join(', ') };
        db.ref().update(up).then(() => { kosik = {}; document.getElementById('kosik-bar').classList.add('hidden'); showView('view-home'); });
    }

    function oprav(it) {
        const n = prompt(`Zadaj presný stav pre ${it}:`, mData[aktMiesto][it]);
        if(n !== null) {
            db.ref(`prevadzky/${aktMiesto}/${it}`).set(parseInt(n) || 0);
            db.ref(`prevadzky/${aktMiesto}/posledna_kontrola`).set(new Date().toLocaleDateString('sk-SK'));
        }
    }

    function showView(id) {
        document.getElementById('view-home').classList.add('hidden');
        document.getElementById('view-detail').classList.add('hidden');
        document.getElementById('view-admin').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function addKatalog() {
        const n = document.getElementById('new-item-name').value;
        const t = document.getElementById('new-item-type').value;
        if(n) { db.ref('materialy').push({name: n, type: t}); document.getElementById('new-item-name').value = ""; }
    }
</script>
</body>
</html>

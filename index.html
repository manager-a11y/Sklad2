<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKLAD PRO Mobile</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1a252f; --accent: #3498db; --warehouse: #e67e22; --tools: #9b59b6; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; --white: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: #333; -webkit-tap-highlight-color: transparent; }

        header { position: sticky; top: 0; background: var(--primary); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-links { display: flex; gap: 8px; }
        .nav-links button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 12px; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .nav-links button.active { background: var(--accent); border-color: var(--accent); }

        #main-content { padding: 15px; padding-bottom: 140px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .karta { background: var(--white); padding: 20px; border-radius: 15px; text-align: center; border-top: 5px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .karta-sklad { border-top-color: var(--warehouse); }

        .item-row { background: white; margin-bottom: 12px; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #eee; }
        .item-info { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .item-name { font-weight: bold; font-size: 1.1em; }
        .item-qty { font-size: 1.2em; color: var(--accent); font-weight: 800; }
        
        .item-actions { display: flex; gap: 8px; }
        .btn-qty { flex: 1; padding: 15px 5px; border: none; background: #f0f2f5; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-qty:active { background: #dcdfe3; }
        
        .kosik-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: white; padding: 15px; z-index: 2000; border-top: 4px solid var(--success); }
        .kosik-controls { display: flex; gap: 10px; margin-top: 10px; }
        #kosik-akcia { flex-grow: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: bold; }
        #btn-vykonat { background: var(--success); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; font-size: 16px; }

        .hidden { display: none !important; }
        .kat-header { font-weight: bold; margin: 25px 0 10px 5px; color: #7f8c8d; text-transform: uppercase; font-size: 0.75em; letter-spacing: 1px; }
        
        /* Admin */
        .admin-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; letter-spacing: 1px;">🧹 SKLAD PRO</div>
    <div class="nav-links">
        <button id="btn-home" class="active" onclick="showView('view-hlavna')">🏠</button>
        <button id="btn-history" onclick="showView('view-history')">📜</button>
        <button id="btn-admin" onclick="showView('view-admin')">⚙️</button>
    </div>
</header>

<div id="main-content">
    <div id="view-hlavna">
        <h3 class="kat-header">📦 Sklady</h3>
        <div id="grid-sklady" class="grid"></div>
        <h3 class="kat-header">🏢 Prevádzky</h3>
        <div id="grid-prevadzky" class="grid"></div>
    </div>

    <div id="view-inventura" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button onclick="showView('view-hlavna')" style="background:none; border:none; color:var(--accent); font-weight:bold; font-size:16px; padding:10px 0;">← Späť</button>
            <h2 id="nadpis-p" style="margin:0; font-size: 1.4em;">Miesto</h2>
        </div>
        <div id="list-material"></div>
        <div id="list-pomocky"></div>

        <div style="margin-top:30px; padding:20px; background:#e9ecef; border-radius:15px;">
            <label style="display:block; margin-bottom:10px; font-weight:bold;">➕ Pridať tovar na toto miesto:</label>
            <select id="sel-katalog"></select>
            <button onclick="pridatZKatalogu()" style="width:100%; background:var(--primary); color:white; border:none; padding:15px; border-radius:10px; font-weight:bold;">Pridať do zoznamu</button>
        </div>
    </div>

    <div id="view-history" class="hidden">
        <h3>História pohybov</h3>
        <div id="list-historia"></div>
    </div>

    <div id="view-admin" class="hidden">
        <h3>Nastavenia</h3>
        <div class="admin-card">
            <h4>🏢 Pridať nové miesto</h4>
            <input type="text" id="new-p-name" placeholder="Názov (napr. Sklad 3)">
            <button onclick="addMiesto()" style="width:100%; background:var(--success); color:white; border:none; padding:15px; border-radius:10px; font-weight:bold;">Uložiť miesto</button>
            <div id="list-prevadzky-admin" style="margin-top:20px;"></div>
        </div>
        <div class="admin-card">
            <h4>📦 Pridať tovar do katalógu</h4>
            <input type="text" id="new-m-name" placeholder="Názov tovaru">
            <select id="new-m-type">
                <option value="material">💧 Materiál</option>
                <option value="pomocka">🛠️ Pomôcka</option>
            </select>
            <button onclick="addItemToKatalog()" style="width:100%; background:var(--success); color:white; border:none; padding:15px; border-radius:10px; font-weight:bold;">Uložiť do katalógu</button>
            <div id="list-katalog-admin" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<div id="kosik-bar" class="kosik-bar hidden">
    <div id="kosik-text" style="font-size: 0.9em; font-weight: bold;"></div>
    <div class="kosik-controls">
        <select id="kosik-akcia"></select>
        <button id="btn-vykonat" onclick="vykonatPohyb()">OK</button>
        <button onclick="zrusitKosik()" style="background:none; border:1px solid white; color:white; border-radius:10px; padding:0 15px;">X</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "sklad-771a4.firebaseapp.com",
        databaseURL: "https://sklad-771a4-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sklad-771a4",
        storageBucket: "sklad-771a4.firebasestorage.app",
        messagingSenderId: "566464602816",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let vsetkyMesta = {}; let katalog = {}; let aktMiesto = ""; let kosik = {};

    db.ref('/').on('value', (snap) => {
        const data = snap.val() || {};
        vsetkyMesta = data.prevadzky || {};
        katalog = data.materialy || {};
        renderDashboard();
        renderAdmin();
        renderHistory(data.historia || {});
        if(aktMiesto) refreshDetail();
    });

    function renderDashboard() {
        const gS = document.getElementById('grid-sklady');
        const gP = document.getElementById('grid-prevadzky');
        gS.innerHTML = ""; gP.innerHTML = "";
        Object.keys(vsetkyMesta).sort().forEach(m => {
            const isSklad = m.toLowerCase().includes('sklad');
            const html = `<div class="karta ${isSklad ? 'karta-sklad' : ''}" onclick="otvorMiesto('${m}')">
                <div style="font-size:30px; margin-bottom:5px;">${isSklad ? '📦' : '🏢'}</div>
                <div style="font-weight:bold; font-size:1.1em;">${m}</div>
            </div>`;
            if(isSklad) gS.innerHTML += html; else gP.innerHTML += html;
        });
    }

    function otvorMiesto(m) { aktMiesto = m; showView('view-inventura'); document.getElementById('nadpis-p').innerText = m; refreshDetail(); }

    function refreshDetail() {
        const data = vsetkyMesta[aktMiesto] || {};
        const lMat = document.getElementById('list-material');
        const lPom = document.getElementById('list-pomocky');
        lMat.innerHTML = ""; lPom.innerHTML = "";

        Object.keys(data).filter(k => !['_init', 'posledna_kontrola'].includes(k)).sort().forEach(item => {
            const katItem = Object.values(katalog).find(x => x.name === item) || {type: 'material'};
            const vKosiku = kosik[item] || 0;
            const html = `
                <div class="item-row">
                    <div class="item-info">
                        <span class="item-name">${item}</span>
                        <span class="item-qty">${data[item]} ks</span>
                    </div>
                    <div class="item-actions">
                        <button class="btn-qty" onclick="zmenKosik('${item}', 1)">+1</button>
                        <button class="btn-qty" onclick="zmenKosik('${item}', 10)">+10</button>
                        <button class="btn-qty" onclick="zmenKosik('${item}', -1)">-1</button>
                        <button onclick="opravitStav('${item}')" style="background:none; border:none; font-size:22px; padding:0 10px;">✏️</button>
                    </div>
                    ${vKosiku != 0 ? `<div style="color:var(--success); font-weight:bold; font-size:0.85em; margin-top:10px;">V zozname na presun: ${vKosiku} ks</div>` : ''}
                </div>`;
            if(katItem.type === 'pomocka') lPom.innerHTML += html; else lMat.innerHTML += html;
        });

        const selAkcia = document.getElementById('kosik-akcia');
        const isSklad = aktMiesto.toLowerCase().includes('sklad');
        let moznosti = `<option value="PRIJEM">➕ PRÍJEM (od Dodávateľa)</option>`;
        if(isSklad) {
            Object.keys(vsetkyMesta).filter(x => x !== aktMiesto).sort().forEach(x => {
                moznosti += `<option value="${x}">🚚 ROZVOZ: ${x}</option>`;
            });
        }
        selAkcia.innerHTML = moznosti;
        
        document.getElementById('sel-katalog').innerHTML = `<option value="">-- Vybrať tovar --</option>` + 
            Object.values(katalog).sort((a,b)=>a.name.localeCompare(b.name)).map(x => `<option value="${x.name}">${x.name}</option>`).join('');
        
        renderKosikBar();
    }

    function zmenKosik(item, qty) {
        kosik[item] = (kosik[item] || 0) + qty;
        if(kosik[item] === 0) delete kosik[item];
        renderKosikBar();
        refreshDetail();
    }

    function renderKosikBar() {
        const bar = document.getElementById('kosik-bar');
        const keys = Object.keys(kosik);
        if(keys.length > 0) {
            bar.classList.remove('hidden');
            document.getElementById('kosik-text').innerText = "V zozname: " + keys.map(k => `${kosik[k]}x ${k}`).join(', ');
        } else { bar.classList.add('hidden'); }
    }

    function vykonatPohyb() {
        const ciel = document.getElementById('kosik-akcia').value;
        const updates = {}; const log = []; const cas = new Date().toLocaleString('sk-SK');
        Object.keys(kosik).forEach(item => {
            const q = kosik[item];
            if(ciel === "PRIJEM") {
                updates[`prevadzky/${aktMiesto}/${item}`] = (vsetkyMesta[aktMiesto][item] || 0) + q;
                log.push(`${q}ks ${item}`);
            } else {
                updates[`prevadzky/${aktMiesto}/${item}`] = (vsetkyMesta[aktMiesto][item] || 0) - q;
                updates[`prevadzky/${ciel}/${item}`] = (vsetkyMesta[ciel][item] || 0) + q;
                log.push(`${q}ks ${item}`);
            }
        });
        updates[`historia/${Date.now()}`] = { datum: cas, odkial: ciel === "PRIJEM" ? "DODÁVATEĽ" : aktMiesto, kam: ciel === "PRIJEM" ? aktMiesto : ciel, polozky: log.join(', ') };
        db.ref().update(updates).then(() => { alert("Úspešne vykonané"); zrusitKosik(); showView('view-hlavna'); });
    }

    function zrusitKosik() { kosik = {}; renderKosikBar(); if(aktMiesto) refreshDetail(); }

    function opravitStav(item) {
        const n = prompt(`Zadaj presný stav pre ${item}:`, vsetkyMesta[aktMiesto][item]);
        if(n !== null && n !== "") { 
            db.ref(`prevadzky/${aktMiesto}/${item}`).set(parseInt(n) || 0); 
            db.ref(`prevadzky/${aktMiesto}/posledna_kontrola`).set(new Date().toLocaleString('sk-SK'));
        }
    }

    function showView(id) {
        ['view-hlavna', 'view-admin', 'view-inventura', 'view-history'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
        if(id === 'view-hlavna') document.getElementById('btn-home').classList.add('active');
        if(id === 'view-admin') document.getElementById('btn-admin').classList.add('active');
        if(id === 'view-history') document.getElementById('btn-history').classList.add('active');
        window.scrollTo(0,0);
    }

    function renderAdmin() {
        document.getElementById('list-prevadzky-admin').innerHTML = Object.keys(vsetkyMesta).sort().map(m => `
            <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #eee;">
                <span>${m}</span><button onclick="if(confirm('Zmazať?')) db.ref('prevadzky/${m}').remove()" style="color:red; border:none; background:none; font-weight:bold;">ZMAZAŤ ✖</button>
            </div>`).join('');
        document.getElementById('list-katalog-admin').innerHTML = Object.keys(katalog).map(id => `
            <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #eee;">
                <span>${katalog[id].name}</span><button onclick="if(confirm('Zmazať?')) db.ref('materialy/${id}').remove()" style="color:red; border:none; background:none; font-weight:bold;">ZMAZAŤ ✖</button>
            </div>`).join('');
    }

    function renderHistory(hist) {
        const entries = Object.values(hist).reverse().slice(0, 30);
        document.getElementById('list-historia').innerHTML = entries.map(h => `
            <div style="padding:15px; border-bottom:1px solid #ddd; font-size:0.9em; background:white; margin-bottom:10px; border-radius:10px;">
                <div style="color:#7f8c8d; font-size:0.8em;">${h.datum}</div>
                <strong style="display:block; margin:5px 0;">${h.odkial} ➡️ ${h.kam}</strong>
                <div style="color:#555;">${h.polozky}</div>
            </div>`).join('');
    }

    function addMiesto() { const n = document.getElementById('new-p-name').value; if(n) { db.ref('prevadzky/' + n).set({_init: true}); document.getElementById('new-p-name').value = ""; } }
    function addItemToKatalog() { const n = document.getElementById('new-m-name').value; const t = document.getElementById('new-m-type').value; if(n) { db.ref('materialy').push({name: n, type: t}); document.getElementById('new-m-name').value = ""; } }
    function pridatZKatalogu() { const val = document.getElementById('sel-katalog').value; if(val) db.ref(`prevadzky/${aktMiesto}/${val}`).set(0); }
</script>
</body>
</html>

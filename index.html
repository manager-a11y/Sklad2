<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEEPLY Manažér - Kontroly</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --deeply-yellow: #FFD700; --deeply-dark: #1a1a1a; --mat-color: #3498db; --tool-color: #9b59b6; --check-color: #27ae60; --bg: #f4f4f4; --danger: #e74c3c; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); -webkit-tap-highlight-color: transparent; }
        header { position: sticky; top: 0; background: var(--deeply-yellow); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: 900; font-size: 1.2em; }
        .nav-btn { background: rgba(0,0,0,0.05); border: none; padding: 10px; border-radius: 10px; font-weight: bold; }
        .nav-btn.active { background: var(--deeply-dark); color: white; }
        #main-content { padding: 15px; padding-bottom: 160px; }
        .section-title { font-size: 0.8em; font-weight: bold; color: #666; margin: 20px 0 10px 5px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .karta { background: white; padding: 20px; border-radius: 18px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .tab-wrapper { display: flex; background: #eee; border-radius: 12px; padding: 4px; margin-bottom: 20px; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 10px 5px; border: none; border-radius: 10px; font-weight: bold; background: none; color: #666; font-size: 0.75em; white-space: nowrap; }
        .tab-btn.active { background: white; color: var(--deeply-dark); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .item-row { background: white; margin-bottom: 10px; padding: 15px; border-radius: 15px; }
        .item-row.out-of-stock { background: #fff5f5; border: 1px solid #feb2b2; }
        .item-info { display: flex; justify-content: space-between; align-items: center; }
        .qty-text { font-weight: 900; }
        .qty-text.critical { color: var(--danger); }

        .check-item { display: flex; align-items: center; background: white; padding: 18px; border-radius: 15px; margin-bottom: 8px; gap: 12px; border-left: 5px solid #ddd; }
        .check-item.done { border-left-color: var(--check-color); background: #f0fff4; }
        .checkbox-custom { width: 24px; height: 24px; border: 2px solid #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .done .checkbox-custom { background: var(--check-color); border-color: var(--check-color); color: white; }
        
        .admin-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        .btn-qty { flex: 1; padding: 15px; border: none; background: #f0f0f0; border-radius: 12px; font-weight: bold; }
        .btn-qty:disabled { opacity: 0.2; }
        .hidden { display: none !important; }
        .del-btn { color: #ccc; border: none; background: none; padding: 5px; }
        
        .kosik-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--deeply-dark); color: white; padding: 20px; z-index: 2000; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .log-entry { background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--check-color); font-size: 0.85em; }
    </style>
</head>
<body>

<header>
    <div class="logo">DEEPLY</div>
    <div style="display:flex; gap:5px;">
        <button id="b1" class="nav-btn active" onclick="showView('view-hlavna')">🏠</button>
        <button id="b2" class="nav-btn" onclick="showView('view-history')">📜</button>
        <button id="b3" class="nav-btn" onclick="showView('view-admin')">⚙️</button>
    </div>
</header>

<div id="main-content">
    <div id="view-hlavna">
        <div class="section-title">📦 Sklady</div>
        <div id="grid-sklady" class="grid"></div>
        <div class="section-title">🏢 Prevádzky</div>
        <div id="grid-prevadzky" class="grid"></div>
    </div>

    <div id="view-detail" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button onclick="showView('view-hlavna')" style="border:none; background:none; font-weight:bold; font-size: 1.1em;">✕</button>
            <h2 id="det-n" style="margin:0; font-size: 1.1em;">-</h2>
            <div style="width:20px;"></div>
        </div>
        
        <div class="tab-wrapper">
            <button id="tab-zasoby" class="tab-btn active" onclick="switchTab('zasoby')">📦 ZÁSOBY</button>
            <button id="tab-checklist" class="tab-btn" onclick="switchTab('checklist')">✅ CHECKLIST</button>
            <button id="tab-logy" class="tab-btn" onclick="switchTab('logy')">📜 KONTROLY</button>
        </div>
        
        <div id="content-zasoby">
            <div style="background:#fff; padding:12px; border-radius:15px; margin-bottom:15px; border:1px solid #eee;">
                <select id="sel-pridat-tovar" style="margin-bottom:8px;"></select>
                <button onclick="pridajZKatalogu()" style="width:100%; padding:12px; background:var(--deeply-yellow); border:none; border-radius:10px; font-weight:bold;">+ PRIDAŤ TOVAR</button>
            </div>
            <div id="list-mat"></div>
            <div id="list-tool" style="margin-top:20px;"></div>
        </div>

        <div id="content-checklist" class="hidden">
            <div id="list-check"></div>
            <button onclick="showView('view-check-setup')" style="width:100%; margin-top:20px; padding:15px; background:#fff; border:1px solid #ddd; border-radius:12px; font-weight:bold; color:#666;">⚙️ Nastaviť úlohy</button>
            <button onclick="resetChecklist()" style="width:100%; margin-top:15px; background:none; border:none; color:var(--danger); font-size:0.8em; opacity:0.5;">VYNULOVAŤ DNEŠNÝ PROGRESS</button>
        </div>

        <div id="content-logy" class="hidden">
            <div class="section-title">História úspešných kontrol</div>
            <div id="miestne-logy"></div>
        </div>
    </div>

    <div id="view-check-setup" class="hidden">
        <button onclick="showView('view-detail')" style="border:none; background:none; font-weight:bold; margin-bottom:20px;">← SPÄŤ</button>
        <h3>Výber úloh: <span id="setup-n"></span></h3>
        <div id="setup-tasks-list" class="admin-card"></div>
    </div>

    <div id="view-history" class="hidden">
        <div class="section-title">Globálna história pohybov</div>
        <div id="list-hist"></div>
    </div>

    <div id="view-admin" class="hidden">
        <div class="admin-card">
            <h4>📦 Katalóg</h4>
            <input type="text" id="add-i-name" placeholder="Názov tovaru">
            <select id="add-i-type"><option value="material">Materiál</option><option value="pomocka">Pomôcka</option></select>
            <button onclick="addKatalog()" style="width:100%; padding:12px; background:var(--deeply-yellow); border:none; border-radius:10px; font-weight:bold;">ULOŽIŤ</button>
            <div id="adm-i-list" style="max-height:150px; overflow-y:auto; margin-top:10px;"></div>
        </div>
        <div class="admin-card">
            <h4>🏢 Miesta a 📝 Úlohy</h4>
            <input type="text" id="add-p-name" placeholder="Názov miesta">
            <button onclick="addMiesto()" style="width:100%; padding:12px; background:#ddd; border:none; border-radius:10px; margin-bottom:15px;">PRIDAŤ MIESTO</button>
            <div id="adm-p-list" style="margin-bottom:15px;"></div>
            <input type="text" id="add-task-text" placeholder="Nová master úloha">
            <button onclick="addTask()" style="width:100%; padding:12px; background:var(--check-color); color:white; border:none; border-radius:10px;">VYTVORIŤ ÚLOHU</button>
            <div id="adm-task-list" style="margin-top:10px;"></div>
        </div>
    </div>
</div>

<div id="kosik-bar" class="kosik-bar hidden">
    <div id="kosik-text" style="font-size:0.9em; margin-bottom:12px; font-weight:bold; color:var(--deeply-yellow);"></div>
    <div style="display:flex; gap:10px;">
        <select id="kosik-kam" style="margin:0; flex:2;"></select>
        <button onclick="potvrd()" style="background:var(--deeply-yellow); border:none; flex:1; border-radius:10px; font-weight:bold;">OK</button>
        <button onclick="zrus()" style="background:none; border:1px solid white; color:white; border-radius:10px; padding:0 15px;">✕</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "sklad-771a4.firebaseapp.com",
        databaseURL: "https://sklad-771a4-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sklad-771a4",
        storageBucket: "sklad-771a4.firebasestorage.app",
        messagingSenderId: "566464602816",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let mData = {}; let kat = {}; let aktMiesto = ""; let kosik = {}; let tasks = {}; let globHist = {};

    db.ref('/').on('value', snap => {
        const d = snap.val() || {};
        mData = d.prevadzky || {}; kat = d.materialy || {}; tasks = d.tasks || {}; globHist = d.historia || {};
        renderDash(); renderAdmin(); renderHist(globHist); if(aktMiesto) refreshDetail();
    });

    function renderDash() {
        const gs = document.getElementById('grid-sklady'); const gp = document.getElementById('grid-prevadzky');
        gs.innerHTML = ""; gp.innerHTML = "";
        Object.keys(mData).sort().forEach(m => {
            const h = `<div class="karta" onclick="otvorMiesto('${m}')">
                <div style="font-size:1.8em; margin-bottom:5px;">${m.toLowerCase().includes('sklad') ? '📦' : '🏢'}</div>
                <div style="font-weight:900; font-size:0.9em;">${m}</div>
                <div style="font-size:0.65em; color:#888; margin-top:5px;">Naposledy: ${mData[m].posledna_kontrola || "---"}</div>
            </div>`;
            if(m.toLowerCase().includes('sklad')) gs.innerHTML += h; else gp.innerHTML += h;
        });
    }

    function otvorMiesto(m) { aktMiesto = m; showView('view-detail'); document.getElementById('det-n').innerText = m; switchTab('zasoby'); refreshDetail(); }

    function refreshDetail() {
        const lm = document.getElementById('list-mat'); const lt = document.getElementById('list-tool');
        lm.innerHTML = '<div class="section-title">💧 MATERIÁL</div>'; lt.innerHTML = '<div class="section-title">🛠️ POMÔCKY</div>';
        const d = mData[aktMiesto] || {};
        
        Object.keys(d).filter(k => !['_init','posledna_kontrola','checks','enabledTasks'].includes(k)).sort().forEach(it => {
            const info = Object.values(kat).find(x => x.name === it) || {type:'material'};
            const val = d[it] || 0;
            const h = `<div class="item-row ${val <= 0 ? 'out-of-stock' : ''}">
                <div class="item-info"><strong>${it}</strong><span class="qty-text ${val <= 0 ? 'critical' : ''}">${val} ks</span></div>
                <div style="display:flex; gap:8px; margin-top:12px;">
                    <button class="btn-qty" onclick="vloz('${it}', 1)">+1</button>
                    <button class="btn-qty" onclick="vloz('${it}', -1)" ${val <= 0 ? 'disabled' : ''}>-1</button>
                    <button onclick="oprav('${it}')" style="background:none; border:none; padding:10px;">✏️</button>
                    <button onclick="zmazMiestnyTovar('${it}')" class="del-btn">✕</button>
                </div></div>`;
            if(info.type === 'pomocka') lt.innerHTML += h; else lm.innerHTML += h;
        });

        const sel = document.getElementById('sel-pridat-tovar'); sel.innerHTML = "";
        Object.values(kat).sort((a,b)=>a.name.localeCompare(b.name)).forEach(k => sel.innerHTML += `<option value="${k.name}">${k.name}</option>`);

        // Checklist logic
        const lc = document.getElementById('list-check'); lc.innerHTML = "";
        const enabled = d.enabledTasks || {}; const savedChecks = d.checks || {};
        Object.keys(tasks).forEach(tid => {
            if(enabled[tid]) {
                const done = savedChecks[tid] ? 'done' : '';
                lc.innerHTML += `<div class="check-item ${done}" onclick="toggleCheck('${tid}')">
                    <div class="checkbox-custom">${done ? '✓' : ''}</div><div style="font-weight:bold;">${tasks[tid].text}</div>
                </div>`;
            }
        });

        // Samostatná História Kontrol (Filtrovaná pre toto miesto)
        const ml = document.getElementById('miestne-logy'); ml.innerHTML = "";
        const logy = Object.values(globHist)
            .filter(h => h.odkial === "CHECKLIST" && h.kam === aktMiesto)
            .reverse();
        
        if(logy.length === 0) ml.innerHTML = "<p style='color:#888; text-align:center;'>Zatiaľ žiadne záznamy.</p>";
        else logy.forEach(l => {
            ml.innerHTML += `<div class="log-entry"><strong>✅ ${l.datum}</strong><br>Kontrola dokončená</div>`;
        });

        const stl = document.getElementById('setup-tasks-list'); stl.innerHTML = "";
        Object.keys(tasks).forEach(tid => { stl.innerHTML += `<div class="setup-row"><span>${tasks[tid].text}</span><input type="checkbox" style="width:auto;" ${enabled[tid] ? 'checked' : ''} onchange="toggleEnabledTask('${tid}', this.checked)"></div>`; });

        const s = document.getElementById('kosik-kam'); s.innerHTML = `<option value="PRIJEM">DODÁVATEĽ</option>`;
        Object.keys(mData).filter(x => x !== aktMiesto).sort().forEach(x => s.innerHTML += `<option value="${x}">${x}</option>`);
    }

    function toggleCheck(tid) {
        const d = mData[aktMiesto];
        const newStatus = !((d.checks && d.checks[tid]) || false);
        db.ref(`prevadzky/${aktMiesto}/checks/${tid}`).set(newStatus).then(() => {
            if(newStatus) checkCompletion();
        });
    }

    function checkCompletion() {
        const d = mData[aktMiesto];
        const enabledKeys = Object.keys(d.enabledTasks || {}).filter(k => d.enabledTasks[k] === true);
        if(enabledKeys.length === 0) return;
        
        // Musíme použiť čerstvé dáta z DB po update
        db.ref(`prevadzky/${aktMiesto}/checks`).once('value', snap => {
            const currentChecks = snap.val() || {};
            const allDone = enabledKeys.every(k => currentChecks[k] === true);
            if(allDone) {
                const cas = new Date().toLocaleString('sk-SK');
                db.ref('historia').push({ datum: cas, odkial: "CHECKLIST", kam: aktMiesto, polozky: "Kompletná kontrola vykonaná." });
                db.ref(`prevadzky/${aktMiesto}/posledna_kontrola`).set(cas);
                alert('Výborne! Checklist na tomto mieste je kompletný.');
            }
        });
    }

    function toggleEnabledTask(tid, val) { db.ref(`prevadzky/${aktMiesto}/enabledTasks/${tid}`).set(val || null); }
    function zmazMiestnyTovar(it) { if(confirm('Odstrániť?')) db.ref(`prevadzky/${aktMiesto}/${it}`).remove(); }
    function pridajZKatalogu() { const val = document.getElementById('sel-pridat-tovar').value; if(val) db.ref(`prevadzky/${aktMiesto}/${val}`).set(0); }
    
    function switchTab(t) {
        ['zasoby', 'checklist', 'logy'].forEach(tab => {
            document.getElementById('content-'+tab).classList.toggle('hidden', t !== tab);
            document.getElementById('tab-'+tab).classList.toggle('active', t === tab);
        });
    }

    function resetChecklist() { if(confirm('Resetovať dnešné úlohy?')) db.ref(`prevadzky/${aktMiesto}/checks`).remove(); }
    
    function vloz(it, q) {
        if(q === -1 && (mData[aktMiesto][it] || 0) <= 0) return;
        kosik[it] = (kosik[it] || 0) + q; if(kosik[it] === 0) delete kosik[it];
        const bar = document.getElementById('kosik-bar');
        if(Object.keys(kosik).length > 0) {
            bar.classList.remove('hidden'); document.getElementById('kosik-text').innerText = Object.keys(kosik).map(x => `${kosik[x]}x ${x}`).join(', ');
        } else bar.classList.add('hidden');
    }

    function potvrd() {
        const kam = document.getElementById('kosik-kam').value; const up = {}; const l = [];
        Object.keys(kosik).forEach(it => {
            const q = kosik[it];
            if(kam === "PRIJEM") up[`prevadzky/${aktMiesto}/${it}`] = (mData[aktMiesto][it] || 0) + q;
            else { up[`prevadzky/${aktMiesto}/${it}`] = (mData[aktMiesto][it] || 0) - q; up[`prevadzky/${kam}/${it}`] = (mData[kam][it] || 0) + q; }
            l.push(`${q}x ${it}`);
        });
        const cas = new Date().toLocaleString('sk-SK');
        up[`historia/${Date.now()}`] = { datum: cas, odkial: kam==="PRIJEM"?"DODÁVATEĽ":aktMiesto, kam: kam==="PRIJEM"?aktMiesto:kam, polozky: l.join(', ') };
        up[`prevadzky/${aktMiesto}/posledna_kontrola`] = cas;
        db.ref().update(up).then(() => { kosik = {}; document.getElementById('kosik-bar').classList.add('hidden'); showView('view-hlavna'); });
    }

    function zrus() { kosik = {}; document.getElementById('kosik-bar').classList.add('hidden'); }
    function oprav(it) {
        const n = prompt(`Stav:`, mData[aktMiesto][it]);
        if(n !== null && n !== "") { db.ref(`prevadzky/${aktMiesto}/${it}`).set(parseInt(n) || 0); }
    }

    function addKatalog() { const n = document.getElementById('add-i-name').value; const t = document.getElementById('add-i-type').value; if(n) { db.ref('materialy').push({name:n, type:t}); document.getElementById('add-i-name').value=""; } }
    function addMiesto() { const n = document.getElementById('add-p-name').value; if(n) { db.ref('prevadzky/'+n).update({_init:true}); document.getElementById('add-p-name').value=""; } }
    function addTask() { const t = document.getElementById('add-task-text').value; if(t) { db.ref('tasks').push({text:t}); document.getElementById('add-task-text').value=""; } }

    function renderAdmin() {
        document.getElementById('adm-i-list').innerHTML = Object.keys(kat).map(id => `<div class="setup-row"><span>${kat[id].name}</span><button class="del-btn" onclick="db.ref('materialy/${id}').remove()">✕</button></div>`).join('');
        document.getElementById('adm-p-list').innerHTML = Object.keys(mData).map(m => `<div class="setup-row"><span>${m}</span><button class="del-btn" onclick="if(confirm('Zmazať?')) db.ref('prevadzky/${m}').remove()">✕</button></div>`).join('');
        document.getElementById('adm-task-list').innerHTML = Object.keys(tasks).map(id => `<div class="setup-row"><span>${tasks[id].text}</span><button class="del-btn" onclick="db.ref('tasks/${id}').remove()">✕</button></div>`).join('');
    }

    function renderHist(h) {
        document.getElementById('list-hist').innerHTML = Object.values(h).reverse().slice(0, 30).map(x => `
            <div style="background:white; padding:10px; border-radius:12px; margin-bottom:8px; font-size:0.8em; border-left:4px solid ${x.odkial==='CHECKLIST'?'var(--check-color)':'var(--deeply-yellow)'}">
                <div style="color:#888;">${x.datum}</div>
                <strong>${x.odkial} ➡️ ${x.kam}</strong><br>${x.polozky}
            </div>
        `).join('');
    }

    function showView(id) {
        ['view-hlavna', 'view-detail', 'view-history', 'view-admin', 'view-check-setup'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(id === 'view-hlavna') document.getElementById('b1').classList.add('active');
        if(id === 'view-history') document.getElementById('b2').classList.add('active');
        if(id === 'view-admin') document.getElementById('b3').classList.add('active');
    }
</script>
</body>
</html>

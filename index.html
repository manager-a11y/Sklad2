<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEEPLY - Categorized Logistics</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --deeply-yellow: #FFD700; --deeply-dark: #1a1a1a; --check-color: #27ae60; --bg: #f4f4f4; --danger: #e74c3c; --warning: #f39c12; --blue: #3498db; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--deeply-dark); }
        header { position: sticky; top: 0; background: var(--deeply-yellow); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: 900; font-size: 1.5em; cursor: pointer; }
        .nav-btn { background: rgba(0,0,0,0.05); border: none; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; min-width: 44px; height: 44px; }
        .nav-btn.active { background: var(--deeply-dark); color: white; }
        #main-content { padding: 15px; padding-bottom: 100px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .karta { padding: 25px 15px; border-radius: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; border: 4px solid transparent; background: white; }
        .status-ok { border-color: var(--check-color); }
        .status-warning { border-color: var(--warning); }
        .status-danger { border-color: var(--danger); }
        .status-sklad { border-color: var(--blue); }
        
        /* Kategórie */
        .cat-header { background: #ddd; padding: 8px 15px; border-radius: 10px; font-size: 0.8em; font-weight: bold; margin: 15px 0 8px 0; text-transform: uppercase; color: #555; }
        .item-row { background: white; margin-bottom: 8px; padding: 12px 15px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid #ddd; background: #fff; font-weight: bold; cursor: pointer; }
        
        .admin-card { background: white; padding: 20px; border-radius: 25px; margin-bottom: 20px; }
        .btn-main { width: 100%; padding: 18px; background: var(--deeply-dark); color: white; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 15px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .hidden { display: none !important; }
        #view-login { height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; background: var(--deeply-yellow); position: fixed; top:0; left:0; z-index: 3000; }
        .login-card { background: white; padding: 30px; border-radius: 30px; width: 280px; text-align: center; }
    </style>
</head>
<body>

<div id="view-login">
    <div class="login-card">
        <h1>DEEPLY</h1>
        <input type="text" id="l-u" placeholder="Meno">
        <input type="password" id="l-p" placeholder="Heslo">
        <button class="btn-main" onclick="tryLogin()">VSTÚPIŤ</button>
    </div>
</div>

<div id="view-app" class="hidden">
    <header>
        <div class="logo" onclick="showView('view-hlavna')">DEEPLY</div>
        <div style="display:flex; gap:8px;">
            <button id="b1" class="nav-btn active" onclick="showView('view-hlavna')">🏠</button>
            <button id="b2" class="nav-btn hidden" onclick="showView('view-sklady')">📦</button>
            <button id="b3" class="nav-btn hidden" onclick="showView('view-admin')">⚙️</button>
            <button class="nav-btn" onclick="location.reload()">🚪</button>
        </div>
    </header>

    <div id="main-content">
        <div id="view-hlavna"><h3>🏢 Prevádzky</h3><div id="grid-p" class="grid"></div></div>
        <div id="view-sklady" class="hidden"><h3>📦 Sklady</h3><div id="grid-s" class="grid"></div></div>

        <div id="view-detail" class="hidden">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button onclick="goBack()" style="border:none; background:none; font-weight:900; font-size: 1.5em;">✕</button>
                <h2 id="det-n">-</h2>
                <div style="width:30px;"></div>
            </div>

            <div id="list-items"></div>
            
            <div id="action-area" style="margin-top:20px;">
                <div id="manager-only-add" class="hidden" style="margin-bottom:15px; padding:15px; background:#fff; border-radius:20px; border:2px dashed #ddd;">
                    <select id="sel-katalog"></select>
                    <button class="btn-main" onclick="addItemToP()" style="background:var(--blue);">PRIDAŤ DO OBJEKTU</button>
                </div>
                <button class="btn-main" style="background:var(--check-color);" onclick="submitCheck()">ODOSLAŤ REPORT</button>
            </div>
        </div>

        <div id="view-admin" class="hidden">
            <div class="admin-card">
                <h3>👥 Užívatelia</h3>
                <input type="text" id="adm-u-n" placeholder="Meno">
                <input type="text" id="adm-u-p" placeholder="Heslo">
                <select id="adm-u-role"><option value="manager">Manažér</option><option value="supervisor">Supervízor</option><option value="upratovac">Upratovač</option></select>
                <button class="btn-main" onclick="adminAddUser()">PRIDAŤ</button>
            </div>

            <div class="admin-card">
                <h3>🏢 Nový Objekt</h3>
                <input type="text" id="adm-p-n" placeholder="Názov">
                <select id="adm-p-t"><option value="prevadzka">🏢 Prevádzka</option><option value="sklad">📦 Sklad</option></select>
                <button class="btn-main" onclick="adminAddP()">VYTVORIŤ</button>
            </div>

            <div class="admin-card">
                <h3>📋 Katalóg s kategóriami</h3>
                <input type="text" id="adm-i-n" placeholder="Názov tovaru">
                <select id="adm-i-c">
                    <option value="Hygiena">🧻 Hygiena</option>
                    <option value="Chémia">🧪 Chémia</option>
                    <option value="Pomôcky">🧹 Pomôcky</option>
                </select>
                <button class="btn-main" onclick="adminAddItem()">PRIDAŤ DO KATALÓGU</button>
                <div id="adm-list-katalog" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "sklad-771a4.firebaseapp.com",
        databaseURL: "https://sklad-771a4-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sklad-771a4",
        storageBucket: "sklad-771a4.firebasestorage.app",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null; let mData = {}; let aktMiesto = ""; let lastV = "view-hlavna";

    function tryLogin() {
        const u = document.getElementById('l-u').value.trim().toLowerCase();
        const p = document.getElementById('l-p').value.trim();
        db.ref('users/'+u).once('value', s => {
            const d = s.val();
            if(d && String(d.pass) === String(p)) {
                user = { name: u, role: d.role };
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                if(user.role === 'manager' || user.role === 'supervisor') document.getElementById('b2').classList.remove('hidden');
                if(user.role === 'manager') document.getElementById('b3').classList.remove('hidden');
                startApp();
            } else alert("Chyba");
        });
    }

    function startApp() {
        db.ref('/').on('value', snap => {
            mData = snap.val() || { prevadzky: {}, katalog: {}, users: {} };
            renderGrids();
            if(aktMiesto) refreshDetail();
            updateKatalogSelect();
            renderAdminKatalog();
        });
    }

    function renderGrids() {
        const gp = document.getElementById('grid-p'); gp.innerHTML = "";
        const gs = document.getElementById('grid-s'); gs.innerHTML = "";
        Object.keys(mData.prevadzky || {}).sort().forEach(m => {
            const p = mData.prevadzky[m];
            const st = (p._type==='sklad') ? 'status-sklad' : 'status-ok'; 
            const html = `<div class="karta ${st}" onclick="otvorMiesto('${m}')"><div>${p._type==='sklad'?'📦':'🏢'}</div><b>${m}</b></div>`;
            if(p._type==='sklad') gs.innerHTML += html; else gp.innerHTML += html;
        });
    }

    function showView(id) {
        if(id !== 'view-detail') lastV = id;
        ['view-hlavna', 'view-sklady', 'view-detail', 'view-admin'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function otvorMiesto(m) { aktMiesto = m; showView('view-detail'); document.getElementById('det-n').innerText = m; }
    function goBack() { showView(lastV); }

    function refreshDetail() {
        const p = mData.prevadzky[aktMiesto];
        const list = document.getElementById('list-items'); list.innerHTML = "";
        document.getElementById('manager-only-add').classList.toggle('hidden', user.role !== 'manager');

        // Zoskupenie položiek podľa kategórie (potrebujeme info z katalógu)
        const categories = ["Hygiena", "Chémia", "Pomôcky"];
        categories.forEach(cat => {
            let catHtml = `<div class="cat-header">${cat}</div>`;
            let hasItems = false;
            
            Object.keys(p).forEach(itemName => {
                if(itemName.startsWith('_')) return;
                // Nájdeme kategóriu v katalógu
                const katItem = Object.values(mData.katalog || {}).find(k => k.n === itemName);
                if(katItem && katItem.c === cat) {
                    hasItems = true;
                    catHtml += `<div class="item-row">
                        <span>${itemName}</span>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty('${itemName}', -1)">-</button>
                            <b>${p[itemName]}</b>
                            <button class="qty-btn" onclick="changeQty('${itemName}', 1)">+</button>
                        </div>
                    </div>`;
                }
            });
            if(hasItems) list.innerHTML += catHtml;
        });
    }

    function changeQty(it, val) {
        const cur = mData.prevadzky[aktMiesto][it] || 0;
        db.ref(`prevadzky/${aktMiesto}/${it}`).set(Math.max(0, cur + val));
    }

    function adminAddItem() {
        const n = document.getElementById('adm-i-n').value.trim();
        const c = document.getElementById('adm-i-c').value;
        if(n) db.ref('katalog').push({n:n, c:c}).then(()=>alert("Pridané"));
    }

    function renderAdminKatalog() {
        const l = document.getElementById('adm-list-katalog'); l.innerHTML = "";
        Object.keys(mData.katalog || {}).forEach(id => {
            const i = mData.katalog[id];
            l.innerHTML += `<div style="font-size:0.8em; margin-bottom:5px;">${i.c}: <b>${i.n}</b></div>`;
        });
    }

    function updateKatalogSelect() {
        const sel = document.getElementById('sel-katalog'); if(!sel) return;
        sel.innerHTML = "";
        Object.values(mData.katalog || {}).sort((a,b)=>a.c.localeCompare(b.c)).forEach(v => {
            sel.innerHTML += `<option value="${v.n}">[${v.c}] ${v.n}</option>`;
        });
    }

    function adminAddUser() {
        const n = document.getElementById('adm-u-n').value.trim().toLowerCase();
        const p = document.getElementById('adm-u-p').value.trim();
        const r = document.getElementById('adm-u-role').value;
        if(n && p) db.ref('users/'+n).set({pass:p, role:r});
    }

    function adminAddP() {
        const n = document.getElementById('adm-p-n').value.trim();
        const t = document.getElementById('adm-p-t').value;
        if(n) db.ref('prevadzky/'+n).update({_type:t});
    }

    function addItemToP() {
        const it = document.getElementById('sel-katalog').value;
        if(it) db.ref(`prevadzky/${aktMiesto}/${it}`).set(0);
    }

    function submitCheck() { db.ref(`prevadzky/${aktMiesto}/last_check`).set(new Date().toISOString()); goBack(); }

    db.ref('users/admin').update({pass:'admin123', role:'manager'});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEEPLY - Smart Access Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --deeply-yellow: #FFD700; --deeply-dark: #1a1a1a; --check-color: #27ae60; --bg: #f4f4f4; --danger: #e74c3c; --warning: #f39c12; --blue: #3498db; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--deeply-dark); }
        header { position: sticky; top: 0; background: var(--deeply-yellow); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: 900; font-size: 1.5em; cursor: pointer; letter-spacing: -1px; }
        .nav-btn { background: rgba(0,0,0,0.05); border: none; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; min-width: 42px; height: 42px; }
        .nav-btn.active { background: var(--deeply-dark); color: white; }
        #main-content { padding: 15px; padding-bottom: 100px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .karta { padding: 20px; border-radius: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; border: 4px solid transparent; background: white; }
        .status-ok { border-color: var(--check-color); }
        .status-warning { border-color: var(--warning); }
        .status-danger { border-color: var(--danger); }
        .status-sklad { border-color: var(--blue); }
        .item-row { background: white; margin-bottom: 10px; padding: 15px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; }
        .qty-controls { display: flex; align-items: center; gap: 12px; }
        .qty-btn { width: 38px; height: 38px; border-radius: 10px; border: 1px solid #ddd; background: #fff; font-weight: bold; cursor: pointer; }
        .btn-main { width: 100%; padding: 18px; background: var(--deeply-dark); color: white; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .hidden { display: none !important; }
        #view-login { height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; background: var(--deeply-yellow); position: fixed; top:0; left:0; z-index: 3000; }
        .login-card { background: white; padding: 30px; border-radius: 30px; width: 280px; text-align: center; }
        .toggle-box { background: #eee; padding: 10px; border-radius: 15px; margin-bottom: 15px; font-size: 0.8em; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="view-login">
    <div class="login-card">
        <h1 style="margin:0 0 20px 0;">DEEPLY</h1>
        <input type="text" id="l-u" placeholder="Meno" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; border:1px solid #ddd;">
        <input type="password" id="l-p" placeholder="Heslo" style="width:100%; padding:15px; margin-bottom:20px; border-radius:15px; border:1px solid #ddd;">
        <button class="btn-main" onclick="tryLogin()">VSTÚPIŤ</button>
    </div>
</div>

<div id="view-app" class="hidden">
    <header>
        <div class="logo" onclick="showView('view-hlavna')">DEEPLY</div>
        <div style="display:flex; gap:8px;">
            <button id="b1" class="nav-btn active" onclick="showView('view-hlavna')">🏠</button>
            <button id="b2" class="nav-btn hidden" onclick="showView('view-sklady')">📦</button>
            <button id="b3" class="nav-btn hidden" onclick="showView('view-admin')">⚙️</button>
            <button class="nav-btn" onclick="location.reload()">🚪</button>
        </div>
    </header>

    <div id="main-content">
        <div id="view-hlavna"><h3>🏢 Prevádzky</h3><div id="grid-p" class="grid"></div></div>
        <div id="view-sklady" class="hidden"><h3>📦 Sklady</h3><div id="grid-s" class="grid"></div></div>

        <div id="view-detail" class="hidden">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button onclick="goBack()" style="border:none; background:none; font-weight:900; font-size: 1.5em;">✕</button>
                <h2 id="det-n" style="margin:0; font-size: 1.1em;">-</h2>
                <div style="width:30px;"></div>
            </div>

            <div id="mgmt-tools" class="hidden">
                <div class="toggle-box">
                    <span>Povoliť inventúru upratovačovi?</span>
                    <input type="checkbox" id="check-upratovac-inv" onchange="toggleInvAccess(this.checked)" style="width:20px; height:20px;">
                </div>
            </div>

            <div id="list-items"></div>
            
            <div id="action-area" style="margin-top:20px;">
                <div id="manager-only-add" class="hidden" style="margin-bottom:15px; padding:15px; background:#fff; border-radius:20px; border:1px dashed #ccc;">
                    <select id="sel-katalog" style="width:100%; padding:12px; border-radius:10px; margin-bottom:10px;"></select>
                    <button class="btn-main" onclick="addItemToP()" style="background:var(--blue); margin:0;">PRIDAŤ DO OBJEKTU</button>
                </div>
                <button class="btn-main" style="background:var(--check-color);" onclick="submitCheck()">ODOSLAŤ KONTROLU (REPORT)</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "sklad-771a4.firebaseapp.com",
        databaseURL: "https://sklad-771a4-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sklad-771a4",
        storageBucket: "sklad-771a4.firebasestorage.app",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null; let mData = {}; let aktMiesto = ""; let lastV = "view-hlavna";

    function tryLogin() {
        const u = document.getElementById('l-u').value.trim().toLowerCase();
        const p = document.getElementById('l-p').value.trim();
        db.ref('users/'+u).once('value', s => {
            const d = s.val();
            if(d && String(d.pass) === String(p)) {
                user = { name: u, role: d.role || 'upratovac' };
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                
                // Zobrazenie ikon v menu podľa role
                if(user.role === 'manager' || user.role === 'supervisor') {
                    document.getElementById('b2').classList.remove('hidden');
                }
                if(user.role === 'manager') {
                    document.getElementById('b3').classList.remove('hidden');
                }
                startApp();
            } else alert("Chyba!");
        });
    }

    function startApp() {
        db.ref('/').on('value', snap => {
            mData = snap.val() || { prevadzky: {}, katalog: {}, users: {} };
            renderGrids();
            if(aktMiesto) refreshDetail();
            updateKatalogSelect();
        });
    }

    function renderGrids() {
        const gp = document.getElementById('grid-p'); gp.innerHTML = "";
        const gs = document.getElementById('grid-s'); gs.innerHTML = "";
        Object.keys(mData.prevadzky || {}).sort().forEach(m => {
            const p = mData.prevadzky[m];
            const html = `<div class="karta ${getStatus(m)}" onclick="otvorMiesto('${m}')">
                <div style="font-size:1.6em;">${p._type==='sklad'?'📦':'🏢'}</div>
                <div style="font-weight:bold; font-size:0.85em; margin-top:8px;">${m}</div>
            </div>`;
            if(p._type === 'sklad') gs.innerHTML += html; else gp.innerHTML += html;
        });
    }

    function getStatus(mName) {
        const p = mData.prevadzky[mName];
        if(p._type === 'sklad') return 'status-sklad';
        if(!p.last_check) return 'status-danger';
        const last = new Date(p.last_check);
        const today = new Date();
        let diff = 0; let temp = new Date(last.getTime());
        while(temp < today) { temp.setDate(temp.getDate()+1); if(temp <= today && (temp.getDay()!==0 && temp.getDay()!==6)) diff++; }
        return diff > (p.rozostup || 2) ? 'status-danger' : (diff === (p.rozostup || 2) ? 'status-warning' : 'status-ok');
    }

    function showView(id) {
        if(id !== 'view-detail') lastV = id;
        ['view-hlavna', 'view-sklady', 'view-detail'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('b1').classList.toggle('active', id==='view-hlavna');
        document.getElementById('b2').classList.toggle('active', id==='view-sklady');
    }

    function otvorMiesto(m) { aktMiesto = m; showView('view-detail'); document.getElementById('det-n').innerText = m; }
    function goBack() { showView(lastV); }

    function refreshDetail() {
        const p = mData.prevadzky[aktMiesto];
        const list = document.getElementById('list-items'); list.innerHTML = "";
        
        // Manažérske nástroje v detaile
        document.getElementById('mgmt-tools').classList.toggle('hidden', user.role !== 'manager');
        document.getElementById('check-upratovac-inv').checked = !!p._allowInv;
        document.getElementById('manager-only-add').classList.toggle('hidden', user.role !== 'manager');

        // Logika zobrazenia zásob
        const canSeeInv = (user.role === 'manager' || user.role === 'supervisor' || (user.role === 'upratovac' && p._allowInv));

        if(canSeeInv) {
            Object.keys(p).sort().forEach(k => { 
                if(!k.startsWith('_') && !['last_check','rozostup','pradlo'].includes(k)) {
                    list.innerHTML += `<div class="item-row">
                        <span style="font-weight:bold;">${k}</span>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty('${k}', -1)">-</button>
                            <b style="min-width:30px; text-align:center;">${p[k]}</b>
                            <button class="qty-btn" onclick="changeQty('${k}', 1)">+</button>
                        </div>
                    </div>`;
                }
            });
        } else {
            list.innerHTML = `<p style="text-align:center; color:#888; padding:20px;">Pre túto prevádzku nemáte povolenú správu zásob.</p>`;
        }
    }

    function toggleInvAccess(val) { db.ref(`prevadzky/${aktMiesto}/_allowInv`).set(val); }

    function changeQty(it, val) {
        const current = mData.prevadzky[aktMiesto][it] || 0;
        db.ref(`prevadzky/${aktMiesto}/${it}`).set(Math.max(0, current + val));
    }

    function addItemToP() {
        const it = document.getElementById('sel-katalog').value;
        if(it) db.ref(`prevadzky/${aktMiesto}/${it}`).set(0);
    }

    function updateKatalogSelect() {
        const sel = document.getElementById('sel-katalog'); if(!sel) return;
        sel.innerHTML = "";
        Object.values(mData.katalog || {}).forEach(v => {
            const name = typeof v === 'string' ? v : v.n;
            sel.innerHTML += `<option value="${name}">${name}</option>`;
        });
    }

    function submitCheck() {
        db.ref(`prevadzky/${aktMiesto}/last_check`).set(new Date().toISOString());
        alert("Kontrola úspešná."); goBack();
    }
</script>
</body>
</html>

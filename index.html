<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEEPLY - Logistika a Inventúra</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --deeply-yellow: #FFD700; --deeply-dark: #1a1a1a; --check-color: #27ae60; --bg: #f4f4f4; --danger: #e74c3c; --blue: #3498db; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--deeply-dark); }
        header { position: sticky; top: 0; background: var(--deeply-yellow); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: 900; font-size: 1.5em; cursor: pointer; letter-spacing: -1px; }
        .nav-btn { background: rgba(0,0,0,0.05); border: none; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; min-width: 42px; }
        .nav-btn.active { background: var(--deeply-dark); color: white; }
        #main-content { padding: 15px; padding-bottom: 100px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .karta { padding: 20px; border-radius: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; border: 3px solid transparent; background: white; }
        .status-sklad { border-color: var(--blue); }
        .item-row { background: white; margin-bottom: 10px; padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-main { width: 100%; padding: 18px; background: var(--deeply-dark); color: white; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input, select { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 15px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        /* Pôvodná login karta */
        #view-login { height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; background: var(--deeply-yellow); position: fixed; top:0; left:0; z-index: 3000; }
        .login-card { background: white; padding: 30px; border-radius: 30px; width: 280px; text-align: center; }

        /* Košík UI */
        #cart-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: var(--deeply-dark); color: white; padding: 20px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1500; }
    </style>
</head>
<body>

<div id="view-login">
    <div class="login-card">
        <h1 style="margin:0 0 20px 0;">DEEPLY</h1>
        <input type="text" id="l-u" placeholder="Meno">
        <input type="password" id="l-p" placeholder="Heslo">
        <button class="btn-main" onclick="tryLogin()">VSTÚPIŤ</button>
    </div>
</div>

<div id="view-app" class="hidden">
    <header>
        <div class="logo" onclick="showView('view-hlavna')">DEEPLY</div>
        <div style="display:flex; gap:10px;">
            <button id="b1" class="nav-btn active" onclick="showView('view-hlavna')">🏠</button>
            <button id="b2" class="nav-btn" onclick="showView('view-sklady')">📦</button>
            <button id="b3" class="nav-btn hidden" onclick="showView('view-admin')">⚙️</button>
            <button class="nav-btn" onclick="location.reload()">🚪</button>
        </div>
    </header>

    <div id="main-content">
        <div id="view-hlavna"><div id="grid-p" class="grid"></div></div>
        <div id="view-sklady" class="hidden"><div id="grid-s" class="grid"></div></div>

        <div id="view-detail" class="hidden">
            <h2 id="det-n" style="text-align:center;">-</h2>
            <div id="list-items"></div>
            
            <div id="admin-add-item-to-p" class="hidden" style="margin-top:20px; padding:15px; background:#fff; border-radius:20px; border:1px dashed #ccc;">
                <select id="sel-katalog"></select>
                <button class="btn-main" onclick="addItemToP()" style="background:var(--blue);">PRIDAŤ DO OBJEKTU</button>
            </div>
        </div>

        <div id="view-admin" class="hidden">
             <p style="text-align:center;">Nastavenia systému v Admin sekcii</p>
        </div>
    </div>

    <div id="cart-bar" class="hidden">
        <div><span id="cart-count">0</span> položiek v košíku</div>
        <button onclick="openCartAction()" style="background:var(--deeply-yellow); border:none; padding:10px 15px; border-radius:10px; font-weight:bold;">AKCIA</button>
    </div>
</div>

<div id="modal-action" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; display:none; align-items:center; justify-content:center;">
    <div style="background:white; padding:25px; border-radius:30px; width:85%; max-width:400px;">
        <h3 id="modal-title">Akcia</h3>
        <div id="modal-fields"></div>
        <button class="btn-main" onclick="processAction()">POTVRDIŤ</button>
        <button class="btn-main" style="background:#eee; color:black;" onclick="closeModal()">ZRUŠIŤ</button>
    </div>
</div>

<script>
    // Firebase Config (vložený tvoj pôvodný)
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "sklad-771a4.firebaseapp.com",
        databaseURL: "https://sklad-771a4-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sklad-771a4",
        storageBucket: "sklad-771a4.firebasestorage.app",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null; let mData = {}; let aktMiesto = ""; let cart = {};

    function tryLogin() {
        const u = document.getElementById('l-u').value.trim().toLowerCase();
        const p = document.getElementById('l-p').value.trim();
        db.ref('users/'+u).once('value', s => {
            const d = s.val();
            if(d && String(d.pass) === String(p)) {
                user = { name: u, role: d.role || 'upratovac' };
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                if(user.role === 'manager') {
                    document.getElementById('b3').classList.remove('hidden');
                    document.getElementById('admin-add-item-to-p').classList.remove('hidden');
                }
                startApp();
            } else alert("Chyba!");
        });
    }

    function startApp() {
        db.ref('/').on('value', snap => {
            mData = snap.val() || { prevadzky: {}, katalog: {}, users: {} };
            renderGrids();
            if(aktMiesto) refreshDetail();
            updateKatalogSelect();
        });
    }

    function renderGrids() {
        const gp = document.getElementById('grid-p'); gp.innerHTML = "";
        const gs = document.getElementById('grid-s'); gs.innerHTML = "";
        Object.keys(mData.prevadzky || {}).sort().forEach(m => {
            const p = mData.prevadzky[m];
            const html = `<div class="karta ${p._type==='sklad'?'status-sklad':''}" onclick="otvorMiesto('${m}')">
                <div style="font-size:1.5em;">${p._type==='sklad'?'📦':'🏢'}</div>
                <div style="font-weight:bold; font-size:0.8em;">${m}</div>
            </div>`;
            if(p._type === 'sklad') gs.innerHTML += html; else gp.innerHTML += html;
        });
    }

    function showView(id) {
        ['view-hlavna', 'view-sklady', 'view-detail', 'view-admin'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('b1').classList.toggle('active', id==='view-hlavna');
        document.getElementById('b2').classList.toggle('active', id==='view-sklady');
        document.getElementById('b3').classList.toggle('active', id==='view-admin');
    }

    function otvorMiesto(m) { aktMiesto = m; showView('view-detail'); document.getElementById('det-n').innerText = m; cart = {}; updateCartBar(); }

    function refreshDetail() {
        const p = mData.prevadzky[aktMiesto];
        const list = document.getElementById('list-items'); list.innerHTML = "";
        Object.keys(p).sort().forEach(k => { 
            if(!k.startsWith('_') && !['last_check','rozostup','pradlo','p_limit','p_count','_type'].includes(k)) {
                let controls = '';
                // Inventúra pre Manažéra a Supervízora
                if(user.role === 'manager' || user.role === 'supervisor') {
                    controls = `<button onclick="doInventory('${k}')" style="border:none; background:#eee; padding:8px; border-radius:10px; font-size:0.7em;">INVENTÚRA</button>`;
                }
                // Košík iba pre Manažéra
                let cartCheckbox = (user.role === 'manager') ? `<input type="checkbox" style="width:25px; height:25px;" onchange="toggleCart('${k}', this.checked)">` : '';

                list.innerHTML += `<div class="item-row">
                    <div style="flex:1"><b>${k}</b><br><span style="color:var(--blue); font-size:1.1em;">${p[k]} ks</span></div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        ${controls}
                        ${cartCheckbox}
                    </div>
                </div>`;
            }
        });
    }

    function toggleCart(item, isChecked) {
        if(isChecked) cart[item] = true; else delete cart[item];
        updateCartBar();
    }

    function updateCartBar() {
        const bar = document.getElementById('cart-bar');
        const count = Object.keys(cart).length;
        if(count > 0 && user.role === 'manager') {
            bar.classList.remove('hidden');
            document.getElementById('cart-count').innerText = count;
        } else bar.classList.add('hidden');
    }

    function openCartAction() {
        const modal = document.getElementById('modal-action');
        const fields = document.getElementById('modal-fields');
        document.getElementById('modal-title').innerText = "Hromadná akcia (Košík)";
        fields.innerHTML = `<select id="cart-op"><option value="in">Príjem od dodávateľa (+)</option><option value="out">Vyskladnenie na inú prevádzku (-)</option></select>`;
        fields.innerHTML += `<div id="target-wrap" class="hidden"><p>Cieľová prevádzka:</p><select id="cart-target"></select></div>`;
        
        Object.keys(cart).forEach(item => {
            fields.innerHTML += `<div style="margin-bottom:10px;">${item}: <input type="number" class="cart-val" data-item="${item}" value="0"></div>`;
        });

        modal.style.display = 'flex';
        
        document.getElementById('cart-op').onchange = function() {
            const wrap = document.getElementById('target-wrap');
            if(this.value === 'out') {
                wrap.classList.remove('hidden');
                const sel = document.getElementById('cart-target'); sel.innerHTML = "";
                Object.keys(mData.prevadzky).forEach(m => { if(m !== aktMiesto) sel.innerHTML += `<option value="${m}">${m}</option>`; });
            } else wrap.classList.add('hidden');
        };
    }

    function doInventory(item) {
        const modal = document.getElementById('modal-action');
        const fields = document.getElementById('modal-fields');
        document.getElementById('modal-title').innerText = "Inventúra: " + item;
        fields.innerHTML = `Aktuálny stav: <input type="number" id="inv-val" value="${mData.prevadzky[aktMiesto][item]}">`;
        modal.style.display = 'flex';
        window.currentInvItem = item;
    }

    function processAction() {
        if(window.currentInvItem) {
            // Spracovanie inventúry
            const val = parseInt(document.getElementById('inv-val').value);
            db.ref(`prevadzky/${aktMiesto}/${window.currentInvItem}`).set(val);
            window.currentInvItem = null;
        } else {
            // Spracovanie košíka
            const op = document.getElementById('cart-op').value;
            const target = document.getElementById('cart-target').value;
            const inputs = document.querySelectorAll('.cart-val');
            
            inputs.forEach(inp => {
                const item = inp.getAttribute('data-item');
                const qty = parseInt(inp.value);
                const currentSource = mData.prevadzky[aktMiesto][item] || 0;

                if(op === 'in') {
                    db.ref(`prevadzky/${aktMiesto}/${item}`).set(currentSource + qty);
                } else if(op === 'out' && target) {
                    const currentTarget = mData.prevadzky[target][item] || 0;
                    db.ref(`prevadzky/${aktMiesto}/${item}`).set(Math.max(0, currentSource - qty));
                    db.ref(`prevadzky/${target}/${item}`).set(currentTarget + qty);
                }
            });
        }
        closeModal();
    }

    function closeModal() { document.getElementById('modal-action').style.display = 'none'; window.currentInvItem = null; }

    function addItemToP() {
        const it = document.getElementById('sel-katalog').value;
        if(it) db.ref(`prevadzky/${aktMiesto}/${it}`).set(0);
    }

    function updateKatalogSelect() {
        const sel = document.getElementById('sel-katalog'); if(!sel) return;
        sel.innerHTML = "";
        Object.values(mData.katalog || {}).forEach(v => sel.innerHTML += `<option value="${v.n}">${v.n}</option>`);
    }

    db.ref('users/admin').update({pass:'admin123', role:'manager'});
</script>
</body>
</html>

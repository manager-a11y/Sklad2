<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEEPLY Sklad & Checklist</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --deeply-yellow: #FFD700; --deeply-dark: #1a1a1a; --mat-color: #3498db; --tool-color: #9b59b6; --check-color: #27ae60; --bg: #f4f4f4; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); -webkit-tap-highlight-color: transparent; }
        
        header { position: sticky; top: 0; background: var(--deeply-yellow); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: 900; font-size: 1.2em; letter-spacing: 1px; }
        
        .nav-btn { background: rgba(0,0,0,0.05); border: none; padding: 10px; border-radius: 10px; font-weight: bold; }
        .nav-btn.active { background: var(--deeply-dark); color: white; }

        #main-content { padding: 15px; padding-bottom: 160px; }
        .section-title { font-size: 0.8em; font-weight: bold; color: #666; margin: 20px 0 10px 5px; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .karta { background: white; padding: 20px; border-radius: 18px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid transparent; }
        .karta:active { transform: scale(0.98); border-color: var(--deeply-yellow); }
        .last-check { font-size: 0.7em; color: #888; display: block; margin-top: 5px; }

        /* Tabs prepínač */
        .tab-wrapper { display: flex; background: #eee; border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-weight: bold; background: none; color: #666; transition: 0.2s; }
        .tab-btn.active { background: white; color: var(--deeply-dark); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .kat-title { color: white; padding: 5px 12px; border-radius: 8px; font-size: 0.8em; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .bg-mat { background: var(--mat-color); }
        .bg-tool { background: var(--tool-color); }

        .item-row { background: white; margin-bottom: 10px; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .item-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .item-qty { font-weight: 900; font-size: 1.1em; }
        .item-actions { display: flex; gap: 5px; }
        .btn-qty { flex: 1; padding: 12px; border: none; background: #f0f0f0; border-radius: 10px; font-weight: bold; }

        /* Checklist štýly */
        .check-item { display: flex; align-items: center; background: white; padding: 18px; border-radius: 15px; margin-bottom: 10px; gap: 15px; transition: 0.3s; border-left: 5px solid #ddd; }
        .check-item.done { border-left-color: var(--check-color); opacity: 0.7; }
        .check-item.done .check-text { text-decoration: line-through; color: #888; }
        .checkbox-custom { width: 24px; height: 24px; border: 2px solid #ddd; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .done .checkbox-custom { background: var(--check-color); border-color: var(--check-color); color: white; }

        .kosik-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--deeply-dark); color: white; padding: 20px; z-index: 2000; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .admin-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo">DEEPLY</div>
    <div style="display:flex; gap:5px;">
        <button id="b1" class="nav-btn active" onclick="showView('view-hlavna')">🏠</button>
        <button id="b2" class="nav-btn" onclick="showView('view-history')">📜</button>
        <button id="b3" class="nav-btn" onclick="showView('view-admin')">⚙️</button>
    </div>
</header>

<div id="main-content">
    <div id="view-hlavna">
        <div class="section-title">📦 Sklady</div>
        <div id="grid-sklady" class="grid"></div>
        <div class="section-title">🏢 Prevádzky</div>
        <div id="grid-prevadzky" class="grid"></div>
    </div>

    <div id="view-detail" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
            <button onclick="showView('view-hlavna')" style="background:none; border:none; font-weight:bold; color:#666; padding:0;">← SPÄŤ</button>
            <h2 id="det-n" style="margin:0; text-align:right; font-size: 1.2em;">-</h2>
        </div>

        <div class="tab-wrapper">
            <button id="tab-zasoby" class="tab-btn active" onclick="switchTab('zasoby')">📦 Zásoby</button>
            <button id="tab-checklist" class="tab-btn" onclick="switchTab('checklist')">✅ Checklist</button>
        </div>

        <div id="content-zasoby">
            <div class="kat-title bg-mat">💧 MATERIÁL</div>
            <div id="list-mat"></div>
            <div class="kat-title bg-tool" style="margin-top:20px;">🛠️ POMÔCKY</div>
            <div id="list-tool"></div>
        </div>

        <div id="content-checklist" class="hidden">
            <div id="list-check"></div>
            <button onclick="resetChecklist()" style="width:100%; margin-top:20px; background:none; border:1px dashed #ccc; color:#888; padding:10px; border-radius:10px; font-size:0.8em;">Resetovať checklist na dnes</button>
        </div>
    </div>

    <div id="view-history" class="hidden">
        <div class="section-title">História pohybov</div>
        <div id="list-hist"></div>
    </div>

    <div id="view-admin" class="hidden">
        <div class="section-title">Správa miest a úloh</div>
        <div class="admin-card">
            <h4>Pridať miesto / Úlohu</h4>
            <input type="text" id="add-p-name" placeholder="Názov miesta">
            <button onclick="addMiesto()" style="width:100%; padding:12px; background:var(--deeply-yellow); border:none; border-radius:10px; font-weight:bold; margin-bottom:20px;">Pridať miesto</button>
            
            <hr style="opacity:0.2;">
            
            <input type="text" id="add-task-text" placeholder="Nová úloha (napr. Vyniesť koše)">
            <button onclick="addTask()" style="width:100%; padding:12px; background:var(--check-color); color:white; border:none; border-radius:10px; font-weight:bold;">Pridať do checklistu</button>
        </div>
        <div class="admin-card">
            <h4>Aktuálne úlohy</h4>
            <div id="adm-task-list"></div>
        </div>
        <div class="admin-card">
            <h4>Katalóg tovarov</h4>
            <input type="text" id="add-i-name" placeholder="Názov tovaru">
            <select id="add-i-type">
                <option value="material">Materiál</option>
                <option value="pomocka">Pomôcka</option>
            </select>
            <button onclick="addKatalog()" style="width:100%; padding:12px; background:var(--deeply-yellow); border:none; border-radius:10px; font-weight:bold;">Pridať tovar</button>
        </div>
    </div>
</div>

<div id="kosik-bar" class="kosik-bar hidden">
    <div id="kosik-text" style="font-size:0.85em; margin-bottom:10px; font-weight:bold; color:var(--deeply-yellow);"></div>
    <div style="display:flex; gap:10px;">
        <select id="kosik-kam" style="margin:0;"></select>
        <button onclick="potvrd()" style="background:var(--deeply-yellow); border:none; padding:10px 20px; border-radius:10px; font-weight:bold;">OK</button>
        <button onclick="zrus()" style="background:none; border:1px solid white; color:white; border-radius:10px; padding:0 15px;">X</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "sklad-771a4.firebaseapp.com",
        databaseURL: "https://sklad-771a4-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sklad-771a4",
        storageBucket: "sklad-771a4.firebasestorage.app",
        messagingSenderId: "566464602816",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let mData = {}; let kat = {}; let aktMiesto = ""; let kosik = {}; let tasks = {};

    db.ref('/').on('value', snap => {
        const d = snap.val() || {};
        mData = d.prevadzky || {};
        kat = d.materialy || {};
        tasks = d.tasks || {};
        renderDash();
        renderAdmin();
        renderHist(d.historia || {});
        if(aktMiesto) refreshDetail();
    });

    function renderDash() {
        const gs = document.getElementById('grid-sklady');
        const gp = document.getElementById('grid-prevadzky');
        gs.innerHTML = ""; gp.innerHTML = "";
        Object.keys(mData).sort().forEach(m => {
            const isS = m.toLowerCase().includes('sklad');
            const last = mData[m].posledna_kontrola || "---";
            const h = `<div class="karta" onclick="otvorMiesto('${m}')">
                <div style="font-size:2em;">${isS ? '📦' : '🏢'}</div>
                <div style="font-weight:bold; margin-top:5px;">${m}</div>
                <span class="last-check">Kontrola: ${last}</span>
            </div>`;
            if(isS) gs.innerHTML += h; else gp.innerHTML += h;
        });
    }

    function otvorMiesto(m) { aktMiesto = m; showView('view-detail'); document.getElementById('det-n').innerText = m; switchTab('zasoby'); refreshDetail(); }

    function switchTab(t) {
        document.getElementById('content-zasoby').classList.toggle('hidden', t !== 'zasoby');
        document.getElementById('content-checklist').classList.toggle('hidden', t !== 'checklist');
        document.getElementById('tab-zasoby').classList.toggle('active', t === 'zasoby');
        document.getElementById('tab-checklist').classList.toggle('active', t === 'checklist');
    }

    function refreshDetail() {
        // Zásoby
        const lm = document.getElementById('list-mat'); const lt = document.getElementById('list-tool');
        lm.innerHTML = ""; lt.innerHTML = "";
        const d = mData[aktMiesto] || {};
        Object.keys(d).filter(k => !['_init','posledna_kontrola','checks'].includes(k)).sort().forEach(it => {
            const info = Object.values(kat).find(x => x.name === it) || {type:'material'};
            const vK = kosik[it] || 0;
            const h = `<div class="item-row">
                <div class="item-info"><span>${it}</span><span class="item-qty">${d[it]} ks</span></div>
                <div class="item-actions">
                    <button class="btn-qty" onclick="vloz('${it}', 1)">+1</button>
                    <button class="btn-qty" onclick="vloz('${it}', -1)">-1</button>
                    <button onclick="oprav('${it}')" style="background:none; border:none; font-size:1.2em;">✏️</button>
                </div>
                ${vK !== 0 ? `<div style="color:var(--deeply-yellow); font-size:0.8em; font-weight:bold; margin-top:5px;">Pripravené: ${vK}ks</div>` : ''}
            </div>`;
            if(info.type === 'pomocka') lt.innerHTML += h; else lm.innerHTML += h;
        });

        // Checklist
        const lc = document.getElementById('list-check'); lc.innerHTML = "";
        const savedChecks = d.checks || {};
        Object.keys(tasks).forEach(tid => {
            const done = savedChecks[tid] ? 'done' : '';
            lc.innerHTML += `<div class="check-item ${done}" onclick="toggleCheck('${tid}')">
                <div class="checkbox-custom">${done ? '✓' : ''}</div>
                <div class="check-text">${tasks[tid].text}</div>
            </div>`;
        });

        const s = document.getElementById('kosik-kam'); s.innerHTML = `<option value="PRIJEM">DODÁVATEĽ</option>`;
        Object.keys(mData).filter(x => x !== aktMiesto).sort().forEach(x => s.innerHTML += `<option value="${x}">${x}</option>`);
    }

    function toggleCheck(tid) {
        const curr = (mData[aktMiesto].checks && mData[aktMiesto].checks[tid]) || false;
        db.ref(`prevadzky/${aktMiesto}/checks/${tid}`).set(!curr);
    }

    function resetChecklist() { if(confirm('Naozaj vymazať dnešné splnené úlohy pre toto miesto?')) db.ref(`prevadzky/${aktMiesto}/checks`).remove(); }

    function vloz(it, q) {
        kosik[it] = (kosik[it] || 0) + q; if(kosik[it] === 0) delete kosik[it];
        const bar = document.getElementById('kosik-bar');
        const k = Object.keys(kosik);
        if(k.length > 0) { bar.classList.remove('hidden'); document.getElementById('kosik-text').innerText = k.map(x => `${kosik[x]}x ${x}`).join(', '); }
        else bar.classList.add('hidden');
        refreshDetail();
    }

    function potvrd() {
        const kam = document.getElementById('kosik-kam').value;
        const up = {}; const l = [];
        Object.keys(kosik).forEach(it => {
            const q = kosik[it];
            if(kam === "PRIJEM") up[`prevadzky/${aktMiesto}/${it}`] = (mData[aktMiesto][it] || 0) + q;
            else { up[`prevadzky/${aktMiesto}/${it}`] = (mData[aktMiesto][it] || 0) - q; up[`prevadzky/${kam}/${it}`] = (mData[kam][it] || 0) + q; }
            l.push(`${q}x ${it}`);
        });
        up[`historia/${Date.now()}`] = { datum: new Date().toLocaleString('sk-SK'), odkial: kam==="PRIJEM"?"DODÁVKA":aktMiesto, kam: kam==="PRIJEM"?aktMiesto:kam, polozky: l.join(', ') };
        db.ref().update(up).then(() => { zrus(); showView('view-hlavna'); });
    }

    function zrus() { kosik = {}; document.getElementById('kosik-bar').classList.add('hidden'); if(aktMiesto) refreshDetail(); }

    function oprav(it) {
        const n = prompt(`Zadaj stav pre ${it}:`, mData[aktMiesto][it]);
        if(n !== null) { db.ref(`prevadzky/${aktMiesto}/${it}`).set(parseInt(n) || 0); db.ref(`prevadzky/${aktMiesto}/posledna_kontrola`).set(new Date().toLocaleDateString('sk-SK')); }
    }

    function renderAdmin() {
        const tl = document.getElementById('adm-task-list');
        tl.innerHTML = Object.keys(tasks).map(id => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; font-size:0.9em;"><span>${tasks[id].text}</span><button onclick="db.ref('tasks/${id}').remove()" style="color:red; border:none; background:none;">✖</button></div>`).join('');
    }

    function renderHist(h) {
        document.getElementById('list-hist').innerHTML = Object.values(h).reverse().slice(0, 15).map(x => `<div style="background:white; padding:12px; border-radius:12px; margin-bottom:10px; font-size:0.85em;"><div style="color:#888;">${x.datum}</div><strong>${x.odkial} ➡️ ${x.kam}</strong><br>${x.polozky}</div>`).join('');
    }

    function showView(id) {
        ['view-hlavna', 'view-detail', 'view-history', 'view-admin'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(id === 'view-hlavna') document.getElementById('b1').classList.add('active');
        if(id === 'view-history') document.getElementById('b2').classList.add('active');
        if(id === 'view-admin') document.getElementById('b3').classList.add('active');
        window.scrollTo(0,0);
    }

    function addMiesto() { const n = document.getElementById('add-p-name').value; if(n) { db.ref('prevadzky/'+n).update({_init:true}); document.getElementById('add-p-name').value=""; } }
    function addKatalog() { const n = document.getElementById('add-i-name').value; const t = document.getElementById('add-i-type').value; if(n) { db.ref('materialy').push({name:n, type:t}); document.getElementById('add-i-name').value=""; } }
    function addTask() { const t = document.getElementById('add-task-text').value; if(t) { db.ref('tasks').push({text:t}); document.getElementById('add-task-text').value=""; } }
</script>
</body>
</html>

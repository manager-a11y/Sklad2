<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sklad PRO - Hromadný Príjem a Výdaj</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1a252f; --accent: #3498db; --warehouse: #e67e22; --tools: #9b59b6; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; }
        #sidebar { width: 250px; background: var(--primary); color: white; height: 100vh; position: fixed; padding: 20px; box-sizing: border-box; }
        .nav-btn { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 6px; cursor: pointer; background: #34495e; color: white; text-align: left; }
        .active { background: var(--accent); }
        #main-content { margin-left: 250px; padding: 40px; width: calc(100% - 250px); box-sizing: border-box; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .karta { background: white; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; border-top: 5px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .karta-sklad { border-top-color: var(--warehouse); }
        .last-manual { font-size: 0.75em; color: #e67e22; margin-top: 10px; display: block; font-weight: bold; }
        .hidden { display: none !important; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .kat-header { padding: 10px; background: #f8f9fa; border-radius: 5px; margin-top: 20px; border-left: 5px solid #ccc; font-weight: bold; }
        .kosik-bar { position: fixed; bottom: 0; left: 250px; right: 0; background: var(--primary); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-top: 3px solid var(--success); box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .btn-qty { background: #eee; border: 1px solid #ccc; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 0 2px; }
        .btn-qty:hover { background: #ddd; }
        .btn-vratit { background: #95a5a6; color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 0.85em; }
        .del-x { color: var(--danger); cursor: pointer; border: none; background: none; margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="margin-bottom:30px;">🧹 SKLAD PRO</h2>
    <button class="nav-btn active" id="btn-home" onclick="showView('view-hlavna')">🏠 Domov</button>
    <button class="nav-btn" id="btn-history" onclick="showView('view-history')">📜 História</button>
    <button class="nav-btn" id="btn-admin" onclick="showView('view-admin')">⚙️ Administrácia</button>
</div>

<div id="main-content">
    <div id="view-hlavna">
        <h1>Prehľad</h1>
        <h2 style="color:var(--warehouse)">📦 Sklady</h2>
        <div id="grid-sklady" class="grid"></div>
        <h2 style="color:var(--accent)">🏢 Prevádzky</h2>
        <div id="grid-prevadzky" class="grid"></div>
    </div>

    <div id="view-inventura" class="hidden" style="margin-bottom: 140px;">
        <button onclick="showView('view-hlavna')" style="cursor:pointer; padding:8px 15px; margin-bottom:15px;">← Späť</button>
        <h1 id="nadpis-p">Detail</h1>
        <div class="card">
            <h3 class="kat-header" style="color:var(--accent)">💧 Čistiaci materiál</h3>
            <table>
                <thead><tr><th>Položka</th><th>Stav</th><th>Akcia</th></tr></thead>
                <tbody id="body-material"></tbody>
            </table>
            <h3 class="kat-header" style="color:var(--tools)">🛠️ Pracovné pomôcky</h3>
            <table>
                <thead><tr><th>Položka</th><th>Stav</th><th>Akcia</th></tr></thead>
                <tbody id="body-pomocky"></tbody>
            </table>
            <div style="background:#f4f7f6; padding:15px; border-radius:8px; display:flex; gap:10px; align-items:center;">
                <select id="sel-mat" style="flex-grow:1; padding:8px;"></select>
                <button onclick="pridatNaP()" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer;">➕ Pridať sem</button>
            </div>
        </div>
    </div>

    <div id="view-history" class="hidden">
        <h1>História pohybov</h1>
        <div class="card" id="list-historia"></div>
    </div>

    <div id="view-admin" class="hidden">
        <h1>Administrácia</h1>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div class="card">
                <h3>🏢 Správa miest</h3>
                <div style="display:flex; gap:5px; margin-bottom:15px;">
                    <input type="text" id="new-p-name" placeholder="Názov">
                    <button onclick="addPrevadzka()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">Pridať</button>
                </div>
                <div id="list-prevadzky"></div>
            </div>
            <div class="card">
                <h3>📦 Katalóg</h3>
                <input type="text" id="new-m-name" placeholder="Názov" style="width:100%; margin-bottom:10px; padding:8px; box-sizing:border-box;">
                <select id="new-m-type" style="width:100%; margin-bottom:10px; padding:8px;">
                    <option value="material">💧 Materiál</option>
                    <option value="pomocka">🛠️ Pomôcka</option>
                </select>
                <button onclick="addMaterial()" style="width:100%; background:var(--primary); color:white; border:none; padding:8px; border-radius:4px; cursor:pointer;">Pridať do katalógu</button>
                <div id="list-materialy" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>
</div>

<div id="kosik-bar" class="kosik-bar hidden">
    <div style="max-width: 50%;"><strong>Zoznam položiek:</strong> <span id="kosik-text" style="font-size: 0.9em; font-style: italic;"></span></div>
    <div style="display:flex; gap:10px; align-items:center;">
        <span>Operácia:</span>
        <select id="kosik-akcia" style="padding:8px; border-radius:4px; font-weight:bold;"></select>
        <button id="btn-potvrdit" onclick="spracovatHromadnyPohyb()" style="background:var(--success); color:white; border:none; padding:12px 20px; border-radius:4px; cursor:pointer; font-weight:bold;">VYKONAŤ</button>
        <button onclick="vynulovatKosik()" style="background:none; color:white; border:1px solid white; padding:8px; cursor:pointer; border-radius:4px;">Zrušiť</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "sklad-771a4.firebaseapp.com",
        databaseURL: "https://sklad-771a4-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sklad-771a4",
        storageBucket: "sklad-771a4.firebasestorage.app",
        messagingSenderId: "566464602816",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let vsetkyP = {}; let vsetkyM = {}; let aktP = ""; let kosik = {};

    db.ref('/').on('value', (snap) => {
        const val = snap.val() || {};
        vsetkyP = val.prevadzky || {};
        vsetkyM = val.materialy || {};
        renderAll();
        renderHistory(val.historia || {});
        if(aktP) refreshInventura();
    });

    function getNow() { return new Date().toLocaleString('sk-SK'); }

    function renderAll() {
        const gS = document.getElementById('grid-sklady');
        const gP = document.getElementById('grid-prevadzky');
        if(!gS) return;
        gS.innerHTML = ""; gP.innerHTML = "";

        Object.keys(vsetkyP).sort().forEach(p => {
            const isSklad = p.toLowerCase().includes('sklad');
            const lastCheck = vsetkyP[p].posledna_kontrola ? `Kontrola: ${vsetkyP[p].posledna_kontrola}` : "Nekontrolované";
            const html = `<div class="karta ${isSklad ? 'karta-sklad' : ''}" onclick="otvorInventuru('${p}')">
                <h3>${p}</h3>
                <span class="last-manual">${lastCheck}</span>
            </div>`;
            if (isSklad) gS.innerHTML += html; else gP.innerHTML += html;
        });

        document.getElementById('list-prevadzky').innerHTML = Object.keys(vsetkyP).sort().map(p => `
            <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee;">
                <span>${p}</span><button class="del-x" onclick="zmazatP('${p}')">✖</button>
            </div>`).join('');

        document.getElementById('list-materialy').innerHTML = Object.keys(vsetkyM).map(id => `
            <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee;">
                <span>[${vsetkyM[id].type === 'pomocka' ? '🛠️' : '💧'}] ${vsetkyM[id].name}</span>
                <button class="del-x" onclick="db.ref('materialy/${id}').remove()">✖</button>
            </div>`).join('');

        document.getElementById('sel-mat').innerHTML = `<option value="">-- Vybrať z katalógu --</option>` + 
            Object.values(vsetkyM).sort((a,b)=>a.name.localeCompare(b.name)).map(m => `<option value="${m.name}">${m.name}</option>`).join('');
    }

    function otvorInventuru(p) { aktP = p; showView('view-inventura'); document.getElementById('nadpis-p').innerText = p; refreshInventura(); }

    function refreshInventura() {
        const isSklad = aktP.toLowerCase().includes('sklad');
        const items = vsetkyP[aktP] || {};
        const bMat = document.getElementById('body-material');
        const bPom = document.getElementById('body-pomocky');
        bMat.innerHTML = ""; bPom.innerHTML = "";

        Object.keys(items).filter(k => !['_init', 'posledna_kontrola'].includes(k)).sort().forEach(itemName => {
            const meta = Object.values(vsetkyM).find(x => x.name === itemName) || {type: 'material'};
            const vKosiku = kosik[itemName] || 0;

            const html = `<tr>
                <td><strong>${itemName}</strong></td>
                <td>${items[itemName]} ks</td>
                <td>
                    <button class="btn-qty" onclick="upravitKosik('${itemName}', 1)">+1</button>
                    <button class="btn-qty" onclick="upravitKosik('${itemName}', 10)">+10</button>
                    <button class="btn-qty" onclick="upravitKosik('${itemName}', -1)">-1</button>
                    <span style="font-weight:bold; color:var(--success); margin-left:10px;">${vKosiku != 0 ? vKosiku + ' ks v zozname' : ''}</span>
                    
                    <div style="float:right;">
                        ${!isSklad ? `
                            <button onclick="manualnaOprava('${itemName}')">Upraviť stav</button>
                            <button class="btn-vratit" onclick="vratitNaSklad('${itemName}')">🔙 Vrátiť</button>
                        ` : ''}
                        <button class="del-x" onclick="odstranitZPrevadzky('${itemName}')">✖</button>
                    </div>
                </td>
            </tr>`;
            if(meta.type === 'pomocka') bPom.innerHTML += html; else bMat.innerHTML += html;
        });

        // Nastavenie možností v košíku
        const selectAkcia = document.getElementById('kosik-akcia');
        if(isSklad) {
            selectAkcia.innerHTML = `<option value="PRIJEM">➕ PRÍJEM (od Dodávateľa)</option>` + 
                Object.keys(vsetkyP).filter(x => x !== aktP).sort().map(x => `<option value="${x}">🚚 VYSKLADNIŤ NA: ${x}</option>`).join('');
        } else {
            selectAkcia.innerHTML = `<option value="PRIJEM">➕ DOPLNIŤ (Inventúrny prírastok)</option>`;
        }
        
        aktualizujKosikBar();
    }

    function upravitKosik(item, qty) {
        let v_kosiku = kosik[item] || 0;
        kosik[item] = v_kosiku + qty;
        if (kosik[item] <= 0) delete kosik[item];
        aktualizujKosikBar();
        refreshInventura();
    }

    function aktualizujKosikBar() {
        const bar = document.getElementById('kosik-bar');
        const count = Object.keys(kosik).length;
        if (count > 0) {
            bar.classList.remove('hidden');
            document.getElementById('kosik-text').innerText = Object.entries(kosik).map(([n, q]) => `${q}x ${n}`).join(', ');
            
            // Zmena farby tlačidla podľa akcie
            const akcia = document.getElementById('kosik-akcia').value;
            const btn = document.getElementById('btn-potvrdit');
            if(akcia === "PRIJEM") {
                btn.style.background = "var(--accent)";
                btn.innerText = "POTVRDIŤ PRÍJEM";
            } else {
                btn.style.background = "var(--success)";
                btn.innerText = "ODOSLAŤ NA PREVÁDZKU";
            }
        } else { bar.classList.add('hidden'); }
    }

    // Sledovanie zmeny v selecte pre zmenu farby tlačidla
    document.getElementById('kosik-akcia').addEventListener('change', aktualizujKosikBar);

    function spracovatHromadnyPohyb() {
        const akcia = document.getElementById('kosik-akcia').value;
        let updates = {}; let logItems = [];
        const cas = getNow();

        Object.keys(kosik).forEach(name => {
            const q = kosik[name];
            if (akcia === "PRIJEM") {
                // Príjem na aktuálne miesto (Sklad)
                updates[`prevadzky/${aktP}/${name}`] = (vsetkyP[aktP][name] || 0) + q;
                logItems.push(q + "ks " + name);
            } else {
                // Výdaj: Odčítame u nás, pripočítame cieľu
                if((vsetkyP[aktP][name] || 0) < q) { alert("Chyba: Položka " + name + " nemá dostatočný stav na sklade!"); return; }
                updates[`prevadzky/${aktP}/${name}`] = vsetkyP[aktP][name] - q;
                updates[`prevadzky/${akcia}/${name}`] = (vsetkyP[akcia][name] || 0) + q;
                logItems.push(q + "ks " + name);
            }
        });

        updates[`historia/${new Date().getTime()}`] = {
            datum: cas,
            odkial: akcia === "PRIJEM" ? "DODÁVATEĽ" : aktP,
            kam: akcia === "PRIJEM" ? aktP : akcia,
            polozky: logItems.join(", ")
        };

        db.ref().update(updates).then(() => {
            alert("Operácia úspešne vykonaná.");
            vynulovatKosik();
            showView('view-hlavna');
        });
    }

    function manualnaOprava(m) {
        const n = prompt("Zadaj reálny fyzický stav pre " + m, vsetkyP[aktP][m]);
        if(n !== null && n !== "") {
            const updates = {};
            updates[`prevadzky/${aktP}/${m}`] = parseInt(n) || 0;
            updates[`prevadzky/${aktP}/posledna_kontrola`] = getNow();
            db.ref().update(updates);
        }
    }

    function vratitNaSklad(m) {
        const n = prompt("Koľko kusov " + m + " vraciaš na sklad?", "1");
        if(n && !isNaN(n)) {
            const povodny = vsetkyP[aktP][m] || 0;
            if(parseInt(n) > povodny) { alert("Nemôžeš vrátiť viac ako máš!"); return; }
            const sklad = Object.keys(vsetkyP).find(x => x.toLowerCase().includes('sklad')) || "Sklad";
            const updates = {};
            updates[`prevadzky/${aktP}/${m}`] = povodny - parseInt(n);
            updates[`prevadzky/${sklad}/${m}`] = (vsetkyP[sklad][m] || 0) + parseInt(n);
            updates[`historia/${new Date().getTime()}`] = { datum: getNow(), odkial: aktP, kam: sklad, polozky: n + "ks " + m + " (VRÁTENIE)" };
            db.ref().update(updates);
        }
    }

    function showView(id) {
        ['view-hlavna', 'view-admin', 'view-inventura', 'view-history'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('kosik-bar').classList.add('hidden');
        if(id === 'view-inventura') aktualizujKosikBar();
    }

    function renderHistory(histData) {
        const entries = Object.values(histData).reverse().slice(0, 50);
        document.getElementById('list-historia').innerHTML = entries.map(h => `
            <div style="border-bottom:1px solid #ddd; padding:10px;">
                <small>${h.datum}</small><br><strong>${h.odkial} ➡️ ${h.kam}</strong><br>${h.polozky}
            </div>`).join('');
    }

    function addPrevadzka() { const n = document.getElementById('new-p-name').value; if(n) { db.ref('prevadzky/' + n).update({ "_init": true }); document.getElementById('new-p-name').value = ""; } }
    function addMaterial() { const n = document.getElementById('new-m-name').value; const t = document.getElementById('new-m-type').value; if(n) { db.ref('materialy').push({name: n, type: t}); document.getElementById('new-m-name').value = ""; } }
    function zmazatP(p) { if(confirm("Zmazať " + p + "?")) db.ref('prevadzky/' + p).remove(); }
    function odstranitZPrevadzky(m) { if(confirm("Odobrať položku z tohto miesta?")) db.ref(`prevadzky/${aktP}/${m}`).remove(); }
    function pridatNaP() { const m = document.getElementById('sel-mat').value; if(m) db.ref(`prevadzky/${aktP}/${m}`).set(0); }
    function vynulovatKosik() { kosik = {}; aktualizujKosikBar(); refreshInventura(); }
</script>
</body>
</html>

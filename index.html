<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEEPLY - Full System</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --deeply-yellow: #FFD700; --deeply-dark: #1a1a1a; --check-color: #27ae60; --bg: #f4f4f4; --danger: #e74c3c; --warning: #f39c12; --blue: #3498db; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--deeply-dark); }
        header { position: sticky; top: 0; background: var(--deeply-yellow); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-weight: 900; font-size: 1.5em; cursor: pointer; letter-spacing: -1px; }
        .nav-btn { background: rgba(0,0,0,0.05); border: none; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; min-width: 40px; }
        .nav-btn.active { background: var(--deeply-dark); color: white; }
        #main-content { padding: 15px; padding-bottom: 100px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .karta { padding: 20px; border-radius: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; border: 3px solid transparent; background: white; }
        .status-ok { border-color: var(--check-color); }
        .status-warning { border-color: var(--warning); }
        .status-danger { border-color: var(--danger); }
        .status-sklad { border-color: var(--blue); background: #f0f7ff; }
        .admin-section { background: white; padding: 20px; border-radius: 25px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .list-item-admin { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9em; }
        .badge { font-size: 0.7em; padding: 3px 8px; border-radius: 10px; background: #eee; margin-left: 5px; }
        .btn-main { width: 100%; padding: 18px; background: var(--deeply-dark); color: white; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 1em; margin-top: 10px; }
        .btn-del { color: var(--danger); border: none; background: none; font-weight: bold; cursor: pointer; }
        input, select { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 15px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .hidden { display: none !important; }
        #view-login { height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; background: var(--deeply-yellow); position: fixed; top:0; left:0; z-index: 3000; }
        .login-card { background: white; padding: 30px; border-radius: 30px; width: 280px; text-align: center; }
        .tab-wrapper { display: flex; background: #e0e0e0; border-radius: 15px; padding: 4px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: bold; background: none; color: #666; font-size: 0.8em; }
        .tab-btn.active { background: white; color: var(--deeply-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .item-row { background: white; margin-bottom: 10px; padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 35px; height: 35px; border-radius: 10px; border: 1px solid #ddd; background: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="view-login">
    <div class="login-card">
        <h1 style="margin:0 0 20px 0;">DEEPLY</h1>
        <input type="text" id="l-u" placeholder="Meno">
        <input type="password" id="l-p" placeholder="Heslo">
        <button class="btn-main" onclick="tryLogin()">VSTÚPIŤ</button>
    </div>
</div>

<div id="view-app" class="hidden">
    <header>
        <div class="logo" onclick="showView('view-hlavna')">DEEPLY</div>
        <div style="display:flex; gap:10px;">
            <button id="b1" class="nav-btn active" onclick="showView('view-hlavna')">🏠</button>
            <button id="b3" class="nav-btn hidden" onclick="showView('view-admin')">⚙️</button>
            <button class="nav-btn" onclick="location.reload()">🚪</button>
        </div>
    </header>

    <div id="main-content">
        <div id="view-hlavna">
            <div id="dashboard-grid" class="grid"></div>
        </div>

        <div id="view-detail" class="hidden">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button onclick="showView('view-hlavna')" style="border:none; background:none; font-weight:900; font-size: 1.5em; cursor:pointer;">✕</button>
                <h2 id="det-n" style="margin:0; font-size: 1.1em; text-align:center;">-</h2>
                <div style="width:30px;"></div>
            </div>
            
            <div class="tab-wrapper">
                <button id="tab-zasoby" class="tab-btn active" onclick="switchTab('zasoby')">📦 ZÁSOBY / SKLAD</button>
                <button id="tab-checklist" class="tab-btn" onclick="switchTab('checklist')">✅ KONTROLA</button>
            </div>

            <div id="content-zasoby">
                <div id="list-items"></div>
                <div style="margin-top:20px; padding:15px; background:#fff; border-radius:20px; border: 1px dashed #ccc;">
                    <p style="font-weight:bold; margin:0 0 10px 0; font-size: 0.8em;">🛒 Naskladniť novú položku z katalógu:</p>
                    <select id="sel-katalog"></select>
                    <button class="btn-main" onclick="addItemToP()" style="padding: 12px; font-size: 0.9em; background: var(--blue);">PRIDAŤ DO OBJEKTU</button>
                </div>
            </div>

            <div id="content-checklist" class="hidden">
                <div id="pradlo-ui" class="hidden" style="padding:20px; background:white; border-radius:20px; text-align:center; margin-bottom:15px;">
                    <p style="font-weight:bold;">🧺 Stav prádla</p>
                    <div style="display:flex; gap:10px;">
                        <button id="p-ano" class="btn-main" style="background:#eee; color:black;" onclick="setPradloTmp(true)">VYMENENÉ</button>
                        <button id="p-nie" class="btn-main" style="background:#eee; color:black;" onclick="setPradloTmp(false)">NETREBA</button>
                    </div>
                </div>
                <button class="btn-main" style="background:var(--check-color);" onclick="submitCheck()">ODOSLAŤ REPORT</button>
            </div>
        </div>

        <div id="view-admin" class="hidden">
            <div class="admin-section">
                <h3>👥 Správa užívateľov</h3>
                <input type="text" id="adm-u-n" placeholder="Meno">
                <input type="text" id="adm-u-p" placeholder="Heslo">
                <select id="adm-u-role">
                    <option value="manager">Manažment (Admin)</option>
                    <option value="supervisor">Supervízor</option>
                    <option value="upratovac">Upratovač</option>
                </select>
                <button class="btn-main" onclick="adminAddUser()">VYTVORIŤ UŽÍVATEĽA</button>
                <div id="adm-list-users" style="margin-top:15px;"></div>
            </div>

            <div class="admin-section">
                <h3>🏢 Správa objektov a skladov</h3>
                <input type="text" id="adm-p-n" placeholder="Názov (napr. Rideta)">
                <select id="adm-p-t">
                    <option value="prevadzka">Prevádzka (Kontrolný bod)</option>
                    <option value="sklad">Centrálny sklad</option>
                </select>
                <button class="btn-main" onclick="adminAddP()">VYTVORIŤ OBJEKT</button>
                <div id="adm-list-prevadzky" style="margin-top:15px;"></div>
            </div>

            <div class="admin-section">
                <h3>📦 Globálny katalóg materiálu</h3>
                <input type="text" id="adm-i-n" placeholder="Názov (napr. Jar 1L)">
                <select id="adm-i-c">
                    <option value="Chémia">Čistiaca chémia</option>
                    <option value="Hygiena">Hygienické potreby</option>
                    <option value="Pomôcky">Náradie a pomôcky</option>
                    <option value="Ostatné">Ostatné</option>
                </select>
                <button class="btn-main" onclick="adminAddItem()">PRIDAŤ DO KATALÓGU</button>
                <div id="adm-list-katalog" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "sklad-771a4.firebaseapp.com",
        databaseURL: "https://sklad-771a4-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "sklad-771a4",
        storageBucket: "sklad-771a4.firebasestorage.app",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null; let mData = {}; let aktMiesto = ""; let tmpPradlo = null;

    function tryLogin() {
        const u = document.getElementById('l-u').value.trim().toLowerCase();
        const p = document.getElementById('l-p').value.trim();
        db.ref('users/'+u).once('value', s => {
            const d = s.val();
            if(d && String(d.pass) === String(p)) {
                user = { name: u, role: d.role || 'upratovac' };
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                if(user.role === 'manager') document.getElementById('b3').classList.remove('hidden');
                startApp();
            } else alert("Neplatné údaje.");
        });
    }

    function startApp() {
        db.ref('/').on('value', snap => {
            mData = snap.val() || { prevadzky: {}, katalog: {}, users: {} };
            renderDashboard();
            if(aktMiesto) refreshDetail();
            renderAdminLists();
            updateKatalogSelect();
        });
    }

    function isWorkDay(date) { const d = date.getDay(); return d !== 0 && d !== 6; }

    function getStatus(mName) {
        const p = mData.prevadzky[mName];
        if(p._type === 'sklad') return 'status-sklad';
        if(!p.last_check) return 'status-danger';
        const last = new Date(p.last_check);
        const today = new Date();
        let diff = 0; let temp = new Date(last.getTime());
        while(temp < today) { temp.setDate(temp.getDate()+1); if(temp <= today && isWorkDay(temp)) diff++; }
        return diff > (p.rozostup || 2) ? 'status-danger' : (diff === (p.rozostup || 2) ? 'status-warning' : 'status-ok');
    }

    function renderDashboard() {
        const grid = document.getElementById('dashboard-grid'); grid.innerHTML = "";
        const pp = mData.prevadzky || {};
        Object.keys(pp).sort().forEach(m => {
            grid.innerHTML += `<div class="karta ${getStatus(m)}" onclick="otvorMiesto('${m}')">
                <div style="font-size:1.8em;">${pp[m]._type === 'sklad' ? '📦' : '🏢'}</div>
                <div style="font-weight:bold; font-size:0.8em; margin-top:5px;">${m}</div>
            </div>`;
        });
    }

    function showView(id) {
        ['view-hlavna', 'view-detail', 'view-admin'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('b1').classList.toggle('active', id==='view-hlavna');
        document.getElementById('b3').classList.toggle('active', id==='view-admin');
    }

    function otvorMiesto(m) { aktMiesto = m; tmpPradlo = null; showView('view-detail'); document.getElementById('det-n').innerText = m; switchTab('zasoby'); }

    function refreshDetail() {
        const p = mData.prevadzky[aktMiesto];
        document.getElementById('pradlo-ui').classList.toggle('hidden', !p.pradlo);
        const list = document.getElementById('list-items'); list.innerHTML = "";
        Object.keys(p).sort().forEach(k => { 
            if(!k.startsWith('_') && !['last_check','rozostup','pradlo','p_limit','p_count','_type'].includes(k)) {
                list.innerHTML += `<div class="item-row">
                    <span>${k}</span>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="changeQty('${k}', -1)">-</button>
                        <b style="min-width:20px; text-align:center;">${p[k]}</b>
                        <button class="qty-btn" onclick="changeQty('${k}', 1)">+</button>
                        <button onclick="removeItemFromP('${k}')" class="btn-del" style="margin-left:10px;">✕</button>
                    </div>
                </div>`;
            }
        });
    }

    function changeQty(it, val) {
        const current = mData.prevadzky[aktMiesto][it] || 0;
        db.ref(`prevadzky/${aktMiesto}/${it}`).set(Math.max(0, current + val));
    }

    function addItemToP() {
        const it = document.getElementById('sel-katalog').value;
        if(it) db.ref(`prevadzky/${aktMiesto}/${it}`).set(0);
    }

    function removeItemFromP(it) { if(confirm('Zmazať položku '+it+' z tohto objektu?')) db.ref(`prevadzky/${aktMiesto}/${it}`).remove(); }

    // --- ADMIN FUNKCIE ---
    function adminAddUser() {
        const n = document.getElementById('adm-u-n').value.trim().toLowerCase();
        const p = document.getElementById('adm-u-p').value.trim();
        const r = document.getElementById('adm-u-role').value;
        if(n && p) db.ref('users/'+n).set({pass:p, role:r}).then(()=> { alert('Hotovo'); document.getElementById('adm-u-n').value=''; document.getElementById('adm-u-p').value=''; });
    }

    function adminAddP() {
        const n = document.getElementById('adm-p-n').value.trim();
        const t = document.getElementById('adm-p-t').value;
        if(n) db.ref('prevadzky/'+n).update({_type:t, rozostup:2}).then(()=> { alert('Vytvorené'); document.getElementById('adm-p-n').value=''; });
    }

    function adminAddItem() {
        const n = document.getElementById('adm-i-n').value.trim();
        const c = document.getElementById('adm-i-c').value;
        if(n) db.ref('katalog').push({n: n, c: c}).then(()=> { alert('Pridané'); document.getElementById('adm-i-n').value=''; });
    }

    function renderAdminLists() {
        // Užívatelia
        const uL = document.getElementById('adm-list-users'); uL.innerHTML = "<b>Existujúci užívatelia:</b>";
        Object.keys(mData.users || {}).forEach(u => {
            const r = mData.users[u].role;
            uL.innerHTML += `<div class="list-item-admin"><span>${u} <span class="badge">${r}</span></span> <button onclick="db.ref('users/${u}').remove()" class="btn-del">ZMAZAŤ</button></div>`;
        });
        // Objekty
        const pL = document.getElementById('adm-list-prevadzky'); pL.innerHTML = "<b>Zoznam prevádzok/skladov:</b>";
        Object.keys(mData.prevadzky || {}).forEach(p => {
            const t = mData.prevadzky[p]._type;
            pL.innerHTML += `<div class="list-item-admin"><span>${p} <span class="badge">${t}</span></span> <button onclick="db.ref('prevadzky/${p}').remove()" class="btn-del">ZMAZAŤ</button></div>`;
        });
        // Katalóg
        const kL = document.getElementById('adm-list-katalog'); kL.innerHTML = "<b>Všetok materiál:</b>";
        Object.keys(mData.katalog || {}).forEach(id => {
            const item = mData.katalog[id];
            const display = typeof item === 'string' ? item : `${item.n}`;
            const cat = item.c || 'Nezaradené';
            kL.innerHTML += `<div class="list-item-admin"><span>${display} <span class="badge">${cat}</span></span> <button onclick="db.ref('katalog/${id}').remove()" class="btn-del">ZMAZAŤ</button></div>`;
        });
    }

    function updateKatalogSelect() {
        const sel = document.getElementById('sel-katalog'); if(!sel) return;
        sel.innerHTML = "";
        const kat = mData.katalog || {};
        Object.keys(kat).forEach(id => {
            const val = typeof kat[id] === 'string' ? kat[id] : kat[id].n;
            sel.innerHTML += `<option value="${val}">${val}</option>`;
        });
    }

    function setPradloTmp(v) { tmpPradlo = v; document.getElementById('p-ano').style.background = v ? 'var(--check-color)' : '#eee'; document.getElementById('p-nie').style.background = !v ? 'var(--danger)' : '#eee'; }

    function submitCheck() {
        const p = mData.prevadzky[aktMiesto];
        if(p.pradlo && tmpPradlo === null) return alert("Označte stav prádla!");
        db.ref(`prevadzky/${aktMiesto}/last_check`).set(new Date().toISOString());
        if(p.pradlo) db.ref(`prevadzky/${aktMiesto}/p_count`).set(tmpPradlo ? 0 : (p.p_count || 0) + 1);
        alert("Report odoslaný"); showView('view-hlavna');
    }

    function switchTab(t) {
        document.getElementById('content-zasoby').classList.toggle('hidden', t!=='zasoby');
        document.getElementById('content-checklist').classList.toggle('hidden', t!=='checklist');
        document.getElementById('tab-zasoby').classList.toggle('active', t==='zasoby');
        document.getElementById('tab-checklist').classList.toggle('active', t==='checklist');
    }

    // Počiatočný admin
    db.ref('users/admin').update({pass:'admin123', role:'manager'});
</script>
</body>
</html>

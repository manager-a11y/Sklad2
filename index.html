<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEEPLY Sklad & Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --deeply-yellow: #FFD700; --deeply-dark: #1a1a1a; --bg: #f4f4f4; --red: #e74c3c; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--deeply-dark); }
        
        /* LOGIN */
        #view-login { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--deeply-yellow); }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* HEADER */
        header { background: var(--deeply-yellow); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-btn { background: rgba(0,0,0,0.1); border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; margin-bottom: 12px; padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; background: var(--deeply-dark); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-small-red { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .hidden { display: none !important; }
        .admin-section { background: #fff; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #ddd; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="view-login">
    <div class="login-box">
        <h2 style="margin-top:0;">DEEPLY</h2>
        <input type="text" id="l-u" placeholder="Užívateľské meno">
        <input type="password" id="l-p" placeholder="Heslo">
        <button class="btn" onclick="tryLogin()">PRIHLÁSIŤ SA</button>
        <p id="l-err" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="view-app" class="hidden">
    <header>
        <span style="font-weight:900;">DEEPLY</span>
        <div style="display:flex; gap:8px;">
            <button title="Zmeniť heslo" class="nav-btn" onclick="showView('view-profile')">🔑</button>
            <button id="admin-toggle" title="Admin" class="nav-btn hidden" onclick="showView('view-admin')">⚙️</button>
            <button class="nav-btn" onclick="location.reload()">🚪</button>
        </div>
    </header>

    <div class="container">
        <div id="view-list">
            <h3>Moje prevádzky</h3>
            <div id="p-list"></div>
        </div>

        <div id="view-detail" class="hidden">
            <button onclick="showView('view-list')" style="background:none; border:none; color:#666; font-weight:bold; cursor:pointer; margin-bottom:15px;">← SPÄŤ</button>
            <h2 id="det-title" style="margin:0;">-</h2>
            <div id="det-items" style="background:white; border-radius:15px; padding:15px; margin-top:15px;"></div>
        </div>

        <div id="view-profile" class="hidden">
            <button onclick="showView('view-list')" style="background:none; border:none; color:#666; font-weight:bold; cursor:pointer; margin-bottom:15px;">← SPÄŤ</button>
            <h2>Môj profil</h2>
            <div class="admin-section">
                <p>Užívateľ: <strong id="prof-name"></strong></p>
                <input type="password" id="new-p1" placeholder="Nové heslo">
                <input type="password" id="new-p2" placeholder="Zopakuj nové heslo">
                <button class="btn" onclick="changeMyPass()">ZMENIŤ MOJE HESLO</button>
            </div>
        </div>

        <div id="view-admin" class="hidden">
            <button onclick="showView('view-list')" style="background:none; border:none; color:#666; font-weight:bold; cursor:pointer; margin-bottom:15px;">← SPÄŤ</button>
            <h2>Administrácia</h2>
            
            <div class="admin-section">
                <h4 style="margin:0 0 10px 0;">Správa užívateľov</h4>
                <div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:15px;">
                    <input type="text" id="adm-u-name" placeholder="Nové meno">
                    <input type="text" id="adm-u-pass" placeholder="Počiatočné heslo">
                    <button class="btn" style="padding:10px;" onclick="dbAddUser()">+ PRIDAŤ</button>
                </div>
                <table>
                    <thead><tr><th>Meno</th><th style="text-align:right;">Akcia</th></tr></thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>

            <div class="admin-section">
                <h4 style="margin:0 0 10px 0;">Nová prevádzka</h4>
                <input type="text" id="adm-p-name" placeholder="Názov prevádzky">
                <button class="btn" style="padding:10px;" onclick="dbAddP()">VYTVORIŤ</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKLGZn7_1rdSwej9ztFQH3aq3dMd0EvA4",
        authDomain: "deeply-72541.firebaseapp.com",
        databaseURL: "https://deeply-72541-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "deeply-72541",
        storageBucket: "deeply-72541.firebasestorage.app",
        appId: "1:566464602816:web:551cca96372d75d5ef8325"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userRole = "";
    let aktP = "";

    function tryLogin() {
        const u = document.getElementById('l-u').value.trim().toLowerCase();
        const p = document.getElementById('l-p').value.trim();
        db.ref('users/' + u).once('value', snap => {
            if (snap.exists() && String(snap.val()) === String(p)) {
                userRole = u;
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('prof-name').innerText = u;
                if(u === 'manager') {
                    document.getElementById('admin-toggle').classList.remove('hidden');
                    loadUsersList();
                }
                initApp();
            } else { alert("Nesprávne údaje."); }
        });
    }

    function initApp() {
        db.ref('prevadzky').on('value', snap => {
            const list = document.getElementById('p-list');
            list.innerHTML = "";
            Object.keys(snap.val() || {}).forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<strong>📦 ${p}</strong>`;
                div.onclick = () => openP(p);
                list.appendChild(div);
            });
        });
    }

    function openP(p) {
        aktP = p;
        showView('view-detail');
        document.getElementById('det-title').innerText = p;
        db.ref('prevadzky/' + p).on('value', snap => {
            const items = snap.val() || {};
            const container = document.getElementById('det-items');
            container.innerHTML = "";
            Object.keys(items).filter(k => !k.startsWith('_')).forEach(it => {
                container.innerHTML += `<div class="item-row"><span>${it}</span><div style="display:flex; gap:10px; align-items:center;"><button class="nav-btn" style="width:35px; height:35px; font-size:20px;" onclick="changeQty('${it}', -1)">-</button><b>${items[it]}</b><button class="nav-btn" style="width:35px; height:35px; font-size:20px;" onclick="changeQty('${it}', 1)">+</button></div></div>`;
            });
            if(userRole === 'manager') {
                container.innerHTML += `<div style="margin-top:20px; border-top:1px solid #eee; padding-top:10px;"><input type="text" id="new-it-name" placeholder="Názov položky"><button class="btn" style="padding:10px;" onclick="dbAddItem()">+ PRIDAŤ</button></div>`;
            }
        });
    }

    function changeQty(it, d) { db.ref(`prevadzky/${aktP}/${it}`).transaction(c => (c || 0) + d); }

    function loadUsersList() {
        db.ref('users').on('value', snap => {
            const tbody = document.getElementById('user-table-body');
            tbody.innerHTML = "";
            const users = snap.val() || {};
            Object.keys(users).forEach(u => {
                if(u === 'manager') return; // Nemazať hlavného admina
                tbody.innerHTML += `<tr><td>${u}</td><td style="text-align:right;"><button class="btn-small-red" onclick="deleteUser('${u}')">Vymazať</button></td></tr>`;
            });
        });
    }

    function dbAddUser() {
        const u = document.getElementById('adm-u-name').value.trim().toLowerCase();
        const p = document.getElementById('adm-u-pass').value.trim();
        if(u && p) db.ref('users/' + u).set(p).then(() => { alert("Užívateľ pridaný."); document.getElementById('adm-u-name').value=""; document.getElementById('adm-u-pass').value=""; });
    }

    function deleteUser(u) { if(confirm("Naozaj vymazať " + u + "?")) db.ref('users/' + u).remove(); }

    function changeMyPass() {
        const p1 = document.getElementById('new-p1').value.trim();
        const p2 = document.getElementById('new-p2').value.trim();
        if(p1 && p1 === p2) {
            db.ref('users/' + userRole).set(p1).then(() => { alert("Heslo zmenené!"); document.getElementById('new-p1').value=""; document.getElementById('new-p2').value=""; showView('view-list'); });
        } else { alert("Heslá sa nezhodujú."); }
    }

    function dbAddP() {
        const n = document.getElementById('adm-p-name').value.trim();
        if(n) db.ref('prevadzky/' + n).set({ "_init": true }).then(() => { alert("OK!"); document.getElementById('adm-p-name').value=""; showView('view-list'); });
    }

    function dbAddItem() {
        const n = document.getElementById('new-it-name').value.trim();
        if(n) db.ref(`prevadzky/${aktP}/${n}`).set(0);
    }

    function showView(id) {
        ['view-list', 'view-detail', 'view-admin', 'view-profile'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
